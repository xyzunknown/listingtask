function estimateTime(site, product, tokenType) {
  const nc = tokenType==='newchain';
  if (site==='HK' && product==='Orderbook') return nc?'约4–6周':'约3–4周';
  if (site==='HK' && product==='RFQ')       return nc?'约3–4周':'约1–2周';
  if (site==='HK' && product==='OTC')       return nc?'约3–4周':'约1–2周';
  if (site==='Global' && product==='RFQ')   return nc?'约2–3周':'约3–5天';
  if (site==='Global' && product==='OTC')   return nc?'约2–3周':'约2–3天';
  if (site==='Global' && product==='Orderbook') return nc?'约3–4周':'约1–2周';
  if (site==='Global' && product==='Perp') return nc?'约3–4周':'约1–2周';
  if (site==='ID') return nc?'约2–3周':'约1周';
  if (product==='ChainOnly')    return nc?'约1–2周':'约2–3天';
  if (product==='WealthToken')  return '约1周';
  return '—';
}

// ─── Storage helpers ──────────────────────────────────────────────────────────
async function loadRecordsFromDB() {
  const { data, error } = await db.from('listing_records').select('data');
  if (error) { console.error('Load error:', error); return []; }
  return (data || []).map(row => row.data);
}
async function syncRecord(record) {
  const { error } = await db.from('listing_records')
    .upsert({ id: record.id, data: record, updated_at: new Date().toISOString() });
  if (error) console.error('Sync error:', error);
}
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function computeStatus(checked, total) {
  const done = Object.values(checked).filter(Boolean).length;
  if (done===0) return 'not_started';
  if (done===total) return 'completed';
  return 'in_progress';
}
function getRecordStatus(r, total) {
  if (r.cancelled) return 'cancelled';
  return computeStatus(r.checked||{}, total);
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtLaunchTime(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
}
// datetime-local input needs "YYYY-MM-DDTHH:MM"
function toInputVal(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:00`;
}

function ProgressRing({ pct, size=48, stroke=4, color='#2E75B6' }) {
  const r = (size-stroke)/2, circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={pct===100?'#059669':color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.4s'}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        style={{fill:pct===100?'#059669':'#374151', fontSize:12, fontWeight:700, transform:'rotate(90deg)', transformOrigin:`${size/2}px ${size/2}px`}}>
        {pct}%
      </text>
    </svg>
  );
}

function Dashboard({ records, onOpen, onNew, onDelete, onRestore, onUpdate, onViewCompleted, onImport }) {
  const [filter, setFilter] = useState('all');
  const [viewMode, setViewMode] = useState('grid'); // 'grid' | 'list' | 'table'
  const [cancelTarget, setCancelTarget] = useState(null);
  const [cancelReason, setCancelReason] = useState('');
  const [editingLaunchId, setEditingLaunchId] = useState(null);
  const [launchInputVal, setLaunchInputVal] = useState('');
  const [editingBlockerId, setEditingBlockerId] = useState(null);
  const [blockerInputVal, setBlockerInputVal] = useState('');
  const [showImportModal, setShowImportModal] = useState(false);
  const [importPreview, setImportPreview] = useState(null); // {newRecords, skipCount}
  const [importFile, setImportFile] = useState(null);

  const openCancelModal = (e, id) => {
    e.stopPropagation();
    setCancelTarget(id);
    setCancelReason('');
  };
  const confirmCancel = () => {
    if (!cancelReason.trim()) return;
    onDelete(cancelTarget, cancelReason.trim());
    setCancelTarget(null);
    setCancelReason('');
  };

  const handleImportFile = (file) => {
    if (!file) return;
    setImportFile(file);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const SITE_MAP = {'OSL HK':'HK','HK':'HK','Global':'Global','OSL Global':'Global','OSL ID':'ID','OSL ID ':'ID','ID':'ID'};
        const PRODUCT_MAP = {'OTC':'OTC','Orderbook':'Orderbook','RFQ':'RFQ','仅上链':'ChainOnly','理财代币':'WealthToken'};
        const IGNORE_PRODUCTS = ['StableHub','Launchpool'];
        const newRecords = [];
        rows.forEach(row => {
          const ticker = (row['Token Ticker']||row['Token']||'').toString().trim();
          if (!ticker) return;
          const siteRaw = (row['站点']||row['Site']||'').toString().trim();
          const productRaw = (row['交易类型']||row['Product']||'').toString().trim();
          // Parse sites (may be comma-separated)
          const siteParts = siteRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const sites = siteParts.map(s=>SITE_MAP[s]).filter(Boolean);
          if (sites.length === 0) sites.push('HK'); // default
          // Parse products (may be comma-separated), filter out ignored ones
          const productParts = productRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const stableHub = productParts.some(p=>p==='StableHub');
          const launchpool = productParts.some(p=>p==='Launchpool');
          const products = productParts.filter(p=>!IGNORE_PRODUCTS.includes(p)).map(p=>PRODUCT_MAP[p]).filter(Boolean);
          if (products.length === 0) products.push('OTC'); // default
          // Parse chain labels
          const chainRaw = (row['区块链']||row['Chain']||'').toString().trim();
          const chainLabels = chainRaw ? chainRaw.split('/').map(s=>s.trim()).filter(Boolean) : [];
          // Parse quote currencies
          const quoteRaw = (row['交易对名称']||row['交易对']||'').toString().trim();
          const quoteCurrencies = quoteRaw ? quoteRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
          // Parse launch time
          let expectedLaunchTime = null;
          const ltRaw = row['预计上线时间']||row['Expected Launch Time']||'';
          if (ltRaw instanceof Date) {
            expectedLaunchTime = ltRaw.toISOString();
          } else if (typeof ltRaw === 'number' && ltRaw > 0) {
            const d = XLSX.SSF.parse_date_code(ltRaw);
            if (d) expectedLaunchTime = new Date(d.y,d.m-1,d.d,d.H||0,d.M||0).toISOString();
          } else if (typeof ltRaw === 'string' && ltRaw.trim()) {
            const parsed = new Date(ltRaw.trim());
            if (!isNaN(parsed)) expectedLaunchTime = parsed.toISOString();
          }
          const userType = (row['用户类型']||row['User Type']||'').toString().trim();
          const expectedMM = (row['做市商']||row['MM']||'').toString().trim();
          const tokenSymbol = ticker.toUpperCase();
          const tokenName = quoteCurrencies.length > 0 ? quoteCurrencies.map(q=>`${tokenSymbol}/${q}`).join(', ') : tokenSymbol;
          sites.forEach(site => {
            products.forEach(product => {
              newRecords.push({
                _key: tokenSymbol+'|'+site+'|'+product,
                id: genId(),
                tokenName, tokenSymbol, quoteCurrencies,
                chainLabels, chainOnly: product==='ChainOnly',
                chains: [], userType, expectedMM, expectedLaunchTime,
                site, product, tokenType:'subtoken',
                stableHub: site==='Global' && product==='RFQ' ? stableHub : false,
                launchpool: site==='ID' ? launchpool : false,
                blocker: '', checked: {}, notes: '',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                estimatedTime: estimateTime(site, product, 'subtoken'),
              });
            });
          });
        });
        // Deduplicate against existing records
        const existingKeys = new Set(records.map(r=>(r.tokenSymbol||r.tokenName).toUpperCase()+'|'+r.site+'|'+r.product));
        const toImport = newRecords.filter(r=>!existingKeys.has(r._key));
        const skipCount = newRecords.length - toImport.length;
        setImportPreview({newRecords: toImport.map(r=>{const {_key,...rest}=r;return rest;}), skipCount});
      } catch(err) {
        console.error('Import error:', err);
        alert('解析文件失败：'+err.message);
      }
    };
    reader.readAsBinaryString(file);
  };

  const confirmImport = () => {
    if (!importPreview || !importPreview.newRecords.length) return;
    onImport(importPreview.newRecords);
    setShowImportModal(false);
    setImportPreview(null);
    setImportFile(null);
  };

  const filtered = records.filter(r => {
    if (filter==='all') return true;
    const checklist = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
    const status = getRecordStatus(r, checklist.length);
    return status === filter;
  });

  const STATUS_ORDER = { in_progress:0, not_started:1, completed:2, cancelled:3 };
  const sorted = [...filtered].sort((a,b) => {
    const clA = buildChecklist(a.site,a.product,a.tokenType,{stableHub:a.stableHub});
    const clB = buildChecklist(b.site,b.product,b.tokenType,{stableHub:b.stableHub});
    const sA = STATUS_ORDER[getRecordStatus(a, clA.length)] ?? 99;
    const sB = STATUS_ORDER[getRecordStatus(b, clB.length)] ?? 99;
    if (sA !== sB) return sA - sB;
    // 进行中：有预期上线时间的排前面，按时间升序（最近截止的优先）
    if (sA === 0) {
      if (a.expectedLaunchTime && b.expectedLaunchTime)
        return new Date(a.expectedLaunchTime) - new Date(b.expectedLaunchTime);
      if (a.expectedLaunchTime) return -1;
      if (b.expectedLaunchTime) return 1;
    }
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  });

  return (
    <div>
      {/* Import modal */}
      {showImportModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:480, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>📥 导入 XLSX</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>选择包含上币记录的 Excel 文件，系统将自动解析并创建任务。</div>
            <input type="file" accept=".xlsx,.xls" onChange={e=>handleImportFile(e.target.files[0])}
              style={{display:'block', marginBottom:16, fontSize:13, fontFamily:'inherit'}}/>
            {importPreview && (
              <div style={{background: importPreview.newRecords.length>0?'#F0FDF4':'#FEF3C7', border:`1px solid ${importPreview.newRecords.length>0?'#86EFAC':'#FDE68A'}`, borderRadius:10, padding:'12px 16px', marginBottom:16, fontSize:13}}>
                <div style={{fontWeight:700, color:'#111827', marginBottom:4}}>
                  将导入 <span style={{color:'#059669'}}>{importPreview.newRecords.length}</span> 条新记录，跳过 <span style={{color:'#D97706'}}>{importPreview.skipCount}</span> 条重复记录
                </div>
                {importPreview.newRecords.length > 0 && (
                  <div style={{marginTop:8, maxHeight:160, overflowY:'auto', display:'flex', flexDirection:'column', gap:4}}>
                    {importPreview.newRecords.slice(0,8).map((r,i)=>(
                      <div key={i} style={{fontSize:12, color:'#374151'}}>
                        {SITES.find(s=>s.id===r.site)?.icon} <strong>{r.tokenSymbol}</strong> · {r.site} · {r.product}
                        {r.expectedLaunchTime && <span style={{color:'#D97706', marginLeft:6}}>🗓 {fmtLaunchTime(r.expectedLaunchTime)}</span>}
                      </div>
                    ))}
                    {importPreview.newRecords.length > 8 && <div style={{fontSize:12, color:'#9CA3AF'}}>还有 {importPreview.newRecords.length-8} 条...</div>}
                  </div>
                )}
              </div>
            )}
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={()=>{setShowImportModal(false);setImportPreview(null);setImportFile(null);}} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>取消</button>
              <button onClick={confirmImport} disabled={!importPreview||!importPreview.newRecords.length} style={{border:'none', background:(importPreview&&importPreview.newRecords.length)?'#2E75B6':'#F3F4F6', color:(importPreview&&importPreview.newRecords.length)?'white':'#9CA3AF', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:(importPreview&&importPreview.newRecords.length)?'pointer':'not-allowed', fontWeight:700}}>确认导入</button>
            </div>
          </div>
        </div>
      )}
      {/* Cancel modal */}
      {cancelTarget && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:440, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>取消上币任务</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>进度数据会完整保留，可随时恢复。请填写取消原因：</div>
            <textarea
              autoFocus
              value={cancelReason}
              onChange={e=>setCancelReason(e.target.value)}
              placeholder="例如：项目方撤回申请、合规未通过、暂缓上线..."
              rows={4}
              style={{width:'100%', border:'2px solid #E5E7EB', borderRadius:10, padding:'10px 12px', fontSize:14, fontFamily:'inherit', resize:'vertical', outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#2E75B6'}
              onBlur={e=>e.target.style.borderColor='#E5E7EB'}
            />
            <div style={{display:'flex', gap:10, marginTop:16, justifyContent:'flex-end'}}>
              <button onClick={()=>setCancelTarget(null)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>返回</button>
              <button onClick={confirmCancel} disabled={!cancelReason.trim()} style={{border:'none', background: cancelReason.trim() ? '#DC2626' : '#F3F4F6', color: cancelReason.trim() ? 'white' : '#9CA3AF', borderRadius:9, padding:'9px 20px', fontSize:13, cursor: cancelReason.trim() ? 'pointer' : 'not-allowed', fontWeight:700}}>确认取消</button>
            </div>
          </div>
        </div>
      )}
      {/* Header */}
      <div style={{background:C.navy, padding:'20px 24px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div>
          <div style={{color:'white', fontSize:20, fontWeight:700}}>OSL 上币流程向导</div>
          <div style={{color:'rgba(255,255,255,0.65)', fontSize:13, marginTop:2}}>管理所有进行中的上币任务</div>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {/* View mode toggle */}
          <div style={{display:'flex', background:'rgba(255,255,255,0.1)', borderRadius:8, overflow:'hidden'}}>
            {[{v:'grid',icon:'⊞'},{v:'table',icon:'⊟'},{v:'list',icon:'☰'}].map(({v,icon})=>(
              <button key={v} onClick={()=>setViewMode(v)} style={{
                background: viewMode===v ? 'rgba(255,255,255,0.25)' : 'transparent',
                border:'none', color:'white', padding:'7px 12px', cursor:'pointer', fontSize:15,
              }}>{icon}</button>
            ))}
          </div>
          <button className="btn" onClick={onViewCompleted} style={{background:'rgba(255,255,255,0.15)', color:'white', border:'1px solid rgba(255,255,255,0.3)', borderRadius:10, padding:'10px 16px', fontWeight:600, cursor:'pointer', fontSize:13}}>
            📊 已完成记录
          </button>
          <button className="btn" onClick={()=>setShowImportModal(true)} style={{background:'rgba(255,255,255,0.15)', color:'white', border:'1px solid rgba(255,255,255,0.3)', borderRadius:10, padding:'10px 16px', fontWeight:600, cursor:'pointer', fontSize:13}}>
            📥 导入
          </button>
          <button className="btn" onClick={onNew} style={{background:'#2E75B6', color:'white', border:'none', borderRadius:10, padding:'10px 20px', fontWeight:700, cursor:'pointer', fontSize:14}}>
            + 新建上币任务
          </button>
        </div>
      </div>

      <div style={{maxWidth: viewMode==='grid'?1400:viewMode==='table'?1400:960, margin:'0 auto', padding:'20px 16px'}}>
        {/* Stats bar */}
        {records.length > 0 && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:20}}>
            {[
              { key:'not_started', label:'未开始', color:'#6B7280' },
              { key:'in_progress',  label:'进行中', color:'#D97706' },
              { key:'completed',    label:'已完成', color:'#059669' },
              { key:'cancelled',    label:'已取消', color:'#9CA3AF' },
            ].map(({key,label,color}) => {
              const cnt = records.filter(r => getRecordStatus(r, buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool}).length) === key).length;
              return (
                <div key={key} onClick={()=>setFilter(filter===key?'all':key)} style={{
                  background: filter===key ? '#EBF4FB' : 'white',
                  border: `1px solid ${filter===key ? '#2E75B6' : '#E5E7EB'}`,
                  borderRadius:12, padding:'14px 16px', cursor:'pointer', textAlign:'center',
                  boxShadow:'0 1px 4px rgba(0,0,0,0.05)'
                }}>
                  <div style={{fontSize:26, fontWeight:800, color}}>{cnt}</div>
                  <div style={{fontSize:12, color:'#6B7280', marginTop:2}}>{label}</div>
                </div>
              );
            })}
          </div>
        )}

        {/* Record list */}
        {sorted.length === 0 ? (
          <div style={{textAlign:'center', padding:'60px 0', color:'#9CA3AF'}}>
            <div style={{fontSize:48, marginBottom:16}}>📋</div>
            <div style={{fontSize:16, fontWeight:600, marginBottom:8}}>还没有上币任务</div>
            <div style={{fontSize:13}}>点击右上角「新建上币任务」开始</div>
          </div>
        ) : viewMode==='grid' ? (
          // ── 网格模式：三列按站点分组 ──
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, alignItems:'start'}}>
            {SITES.map(siteObj => {
              const siteRecords = sorted.filter(r => r.site === siteObj.id);
              return (
                <div key={siteObj.id}>
                  {/* 站点列标题 */}
                  <div style={{
                    background: siteObj.color, borderRadius:10, padding:'8px 14px',
                    marginBottom:8, display:'flex', alignItems:'center', gap:8,
                  }}>
                    <span style={{fontSize:18}}>{siteObj.icon}</span>
                    <span style={{color:'white', fontWeight:800, fontSize:14}}>{siteObj.label}</span>
                    <span style={{marginLeft:'auto', background:'rgba(255,255,255,0.2)', color:'white', fontSize:12, fontWeight:700, borderRadius:99, padding:'1px 8px'}}>{siteRecords.length}</span>
                  </div>
                  {/* 该站点的卡片 */}
                  <div style={{display:'flex', flexDirection:'column', gap:7}}>
                    {siteRecords.length === 0 ? (
                      <div style={{textAlign:'center', padding:'20px 0', color:'#D1D5DB', fontSize:13}}>暂无任务</div>
                    ) : siteRecords.map(r => {
              const checklist = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
              const done = Object.values(r.checked||{}).filter(Boolean).length;
              const pct = checklist.length ? Math.round(done/checklist.length*100) : 0;
              const status = getRecordStatus(r, checklist.length);
              const sm = STATUS_META[status];
              const isGrid = true;
              const isCancelled = status === 'cancelled';
              const siteInfo = SITES.find(s=>s.id===r.site);
              const prodInfo = PRODUCTS.find(p=>p.id===r.product);
              const siteColor = siteInfo?.color || '#6B7280';
              const pendingCritical = isCancelled ? [] : checklist
                .map((step,i)=>({...step,idx:i}))
                .filter(step=>step.critical && !(r.checked||{})[step.idx]);
              return (
                <div key={r.id} className="hover-card" style={{
                  background: isCancelled ? '#FAFAFA' : 'white',
                  borderRadius:10,
                  boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
                  border: pendingCritical.length>0 && !isCancelled ? '1px solid #FECACA' : '1px solid #E5E7EB',
                  borderLeft: `4px solid ${isCancelled ? '#D1D5DB' : siteColor}`,
                  cursor:'pointer', transition:'all 0.15s', overflow:'hidden',
                  opacity: isCancelled ? 0.55 : 1,
                }} onClick={()=>onOpen(r.id)}>
                  {/* Main row */}
                  <div style={{display:'flex', alignItems:'center', gap:12, padding: isGrid ? '9px 12px' : '12px 16px'}}>
                    <ProgressRing pct={pct} />
                    <div style={{flex:1, minWidth:0}}>
                      {/* Row 1: name + badges */}
                      <div style={{display:'flex', alignItems:'center', gap:7, flexWrap:'wrap'}}>
                        <span style={{fontWeight:800, fontSize:16, color:'#111827'}}>{r.tokenName}</span>
                        <span style={{background: isCancelled?'#F3F4F6':siteInfo?.bg, color:siteColor, fontSize:11, fontWeight:800, padding:'2px 9px', borderRadius:99, border:`1px solid ${siteColor}40`}}>{siteInfo?.icon} {r.site}</span>
                        <span style={{background:'#F3F4F6', color:'#374151', fontSize:11, fontWeight:600, padding:'2px 9px', borderRadius:99}}>{prodInfo?.icon} {r.product}{r.stableHub?' +SH':''}{r.launchpool?' +LP':''}</span>
                        <span style={{background:sm.bg, color:sm.color, fontSize:11, fontWeight:700, padding:'2px 9px', borderRadius:99}}>{sm.label}</span>
                        {pendingCritical.length>0 && <span style={{background:'#FEE2E2', color:'#DC2626', fontSize:11, fontWeight:700, padding:'2px 9px', borderRadius:99}}>⚠ {pendingCritical.length} 关键项</span>}
                      </div>
                      {/* Row 2: meta + launch time — 全部一行 */}
                      <div style={{display:'flex', gap:8, marginTop:5, alignItems:'center', flexWrap:'wrap'}}>
                        <span style={{fontSize:12, color:'#4B5563'}}>{r.tokenType==='newchain'?'⛓️ 新链':'🪙 子代币'}</span>
                        {r.expectedMM && <span style={{fontSize:11, color:'#6B7280'}}>MM: {r.expectedMM}</span>}
                        {r.chainOnly && <span style={{fontSize:11, background:'#EDE9FE', color:'#7C3AED', border:'1px solid #DDD6FE', borderRadius:5, padding:'1px 7px', fontWeight:600}}>仅上链</span>}
                        {(r.chainLabels||[]).map((tag,i)=>(
                          <span key={i} style={{fontSize:11, background:'#F3F4F6', color:'#374151', border:'1px solid #E5E7EB', borderRadius:5, padding:'1px 7px', fontWeight:500}}>{tag}</span>
                        ))}
                        {/* Blocker pill */}
                        {r.blocker && <span style={{background:'#FFF7ED', color:'#C2410C', border:'1px solid #FED7AA', borderRadius:5, fontSize:11, padding:'1px 7px', fontWeight:600}}>🚧 {r.blocker}</span>}
                        {/* Blocker quick-edit */}
                        <span onClick={e=>e.stopPropagation()}>
                          {editingBlockerId===r.id ? (
                            <span style={{display:'flex', alignItems:'center', gap:4}}>
                              <input autoFocus value={blockerInputVal} onChange={e=>setBlockerInputVal(e.target.value)}
                                onKeyDown={e=>{if(e.key==='Enter'){onUpdate({...r,blocker:blockerInputVal.trim(),updatedAt:new Date().toISOString()});setEditingBlockerId(null);}if(e.key==='Escape')setEditingBlockerId(null);}}
                                placeholder="卡点说明..."
                                style={{fontSize:11, border:'1.5px solid #FB923C', borderRadius:5, padding:'2px 6px', fontFamily:'inherit', outline:'none', width:120}}/>
                              <button onClick={()=>{onUpdate({...r,blocker:blockerInputVal.trim(),updatedAt:new Date().toISOString()});setEditingBlockerId(null);}} style={{background:'#C2410C', color:'white', border:'none', borderRadius:4, padding:'2px 7px', fontSize:11, cursor:'pointer', fontWeight:700}}>保存</button>
                              <button onClick={()=>setEditingBlockerId(null)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:4, padding:'2px 6px', fontSize:11, cursor:'pointer', color:'#6B7280'}}>✕</button>
                            </span>
                          ) : (
                            <span onClick={()=>{setEditingBlockerId(r.id);setBlockerInputVal(r.blocker||'');}} style={{fontSize:11, color:'#9CA3AF', cursor:'pointer'}} title="编辑卡点">✏</span>
                          )}
                        </span>
                        <span style={{fontSize:12, color:'#9CA3AF'}}>更新 {fmtDate(r.updatedAt)}</span>
                        {status==='in_progress' && (
                          <span style={{display:'flex', alignItems:'center', gap:5}} onClick={e=>e.stopPropagation()}>
                            <span style={{fontSize:12, color:'#374151', fontWeight:600}}>🗓 预期上线：</span>
                            {editingLaunchId===r.id ? (
                              <span style={{display:'flex', alignItems:'center', gap:5}}>
                                <input type="datetime-local" value={launchInputVal} onChange={e=>setLaunchInputVal(e.target.value)} step="3600"
                                  style={{fontSize:12, border:'1.5px solid #2E75B6', borderRadius:6, padding:'2px 8px', fontFamily:'inherit', outline:'none'}}/>
                                <button onClick={()=>{
                                  const iso = launchInputVal ? new Date(launchInputVal).toISOString() : null;
                                  onUpdate({...r, expectedLaunchTime:iso, updatedAt:new Date().toISOString()});
                                  setEditingLaunchId(null);
                                }} style={{background:C.blue, color:'white', border:'none', borderRadius:6, padding:'3px 10px', fontSize:12, cursor:'pointer', fontWeight:700}}>保存</button>
                                <button onClick={()=>setEditingLaunchId(null)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:6, padding:'3px 8px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>取消</button>
                              </span>
                            ) : (
                              <span onClick={()=>{setEditingLaunchId(r.id); setLaunchInputVal(toInputVal(r.expectedLaunchTime));}}
                                style={{fontSize:12, color: r.expectedLaunchTime?'#D97706':'#9CA3AF', fontWeight: r.expectedLaunchTime?700:400,
                                  cursor:'pointer', borderBottom:'1px dashed currentColor', paddingBottom:1}}>
                                {fmtLaunchTime(r.expectedLaunchTime) || '点击设置'}
                              </span>
                            )}
                          </span>
                        )}
                      </div>
                      {/* Row 3: progress bar + step count */}
                      <div style={{display:'flex', alignItems:'center', gap:8, marginTop:6}}>
                        <div style={{flex:1, background:'#E5E7EB', borderRadius:99, height:5, overflow:'hidden', maxWidth:260}}>
                          <div style={{width:`${pct}%`, height:'100%', background: pct===100?'#059669': isCancelled?'#D1D5DB':siteColor, borderRadius:99, transition:'width 0.3s'}}/>
                        </div>
                        <span style={{fontSize:11, color:'#9CA3AF', whiteSpace:'nowrap'}}>{done}/{checklist.length} 步骤</span>
                      </div>
                    </div>
                    {isCancelled
                      ? <button className="btn" onClick={e=>{e.stopPropagation(); onRestore(r.id);}} style={{background:'none', border:'1px solid #D1FAE5', color:'#059669', borderRadius:8, padding:'4px 10px', cursor:'pointer', fontSize:12, fontWeight:700, flexShrink:0, whiteSpace:'nowrap'}}>↩ 恢复</button>
                      : <button className="btn" onClick={e=>openCancelModal(e, r.id)} style={{background:'none', border:'1px solid #E5E7EB', color:'#9CA3AF', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:14, flexShrink:0}} title="取消">✕</button>
                    }
                  </div>
                  {/* Cancelled reason strip */}
                  {isCancelled && r.cancelReason && (
                    <div style={{borderTop:'1px solid #F3F4F6', background:'#FAFAFA', padding:'6px 16px 6px 20px', display:'flex', gap:8, alignItems:'center'}}>
                      <span style={{fontSize:11, fontWeight:700, color:'#9CA3AF', flexShrink:0}}>取消原因</span>
                      <span style={{fontSize:12, color:'#6B7280'}}>{r.cancelReason}</span>
                    </div>
                  )}
                  {/* Pending critical items strip — 两种模式都完整展示 */}
                  {pendingCritical.length>0 && (
                    <div style={{borderTop:'1px solid #FEE2E2', background:'#FFF7F7', padding:'6px 12px 6px 16px', display:'flex', flexDirection:'column', gap:3}}>
                      <div style={{fontSize:10, fontWeight:700, color:'#B91C1C', letterSpacing:0.3, marginBottom:1}}>⚠ PENDING 关键项</div>
                      {pendingCritical.slice(0,4).map((step,i)=>(
                        <div key={i} style={{display:'flex', alignItems:'baseline', gap:5}}>
                          <span style={{fontSize:9, color:'#EF4444', flexShrink:0, marginTop:1}}>✕</span>
                          <span style={{fontSize:11, color:'#111827', fontWeight:600, lineHeight:1.4}}>{step.task}</span>
                          <span style={{fontSize:10, color:'#9CA3AF', flexShrink:0, whiteSpace:'nowrap'}}>— {step.contact.split('\n')[0].split('（')[0].trim()}</span>
                        </div>
                      ))}
                      {pendingCritical.length>4 && <div style={{fontSize:10, color:'#EF4444', marginTop:1}}>还有 {pendingCritical.length-4} 项...</div>}
                    </div>
                  )}
                </div>
              );
            })}
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          // ── 表格模式 ──
          viewMode==='table' ? (
          <div style={{background:'white', borderRadius:14, boxShadow:'0 1px 6px rgba(0,0,0,0.07)', overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
                <thead>
                  <tr style={{background:'#F3F4F6', position:'sticky', top:0, zIndex:1}}>
                    {['Token','区块链','交易对','站点','产品','MM','卡点','上线时间','进度','状态'].map(col=>(
                      <th key={col} style={{padding:'10px 12px', textAlign:'left', fontWeight:700, color:'#374151', borderBottom:'2px solid #E5E7EB', whiteSpace:'nowrap', fontSize:12}}>{col}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((r,i)=>{
                    const checklist = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
                    const done = Object.values(r.checked||{}).filter(Boolean).length;
                    const total = checklist.length;
                    const pct = total ? Math.round(done/total*100) : 0;
                    const status = getRecordStatus(r, total);
                    const sm = STATUS_META[status];
                    const isCancelled = status === 'cancelled';
                    const siteInfo = SITES.find(s=>s.id===r.site);
                    const prodInfo = PRODUCTS.find(p=>p.id===r.product);
                    const siteColor = siteInfo?.color || '#6B7280';
                    const blockerDisplay = r.blocker ? (r.blocker.length>25 ? r.blocker.slice(0,25)+'…' : r.blocker) : '—';
                    return (
                      <tr key={r.id} onClick={()=>onOpen(r.id)} style={{
                        background: i%2===0?'white':'#F9FAFB',
                        borderBottom:'1px solid #F3F4F6',
                        cursor:'pointer', opacity: isCancelled?0.5:1,
                        transition:'background 0.1s',
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background='#EBF4FB'}
                      onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'white':'#F9FAFB'}>
                        <td style={{padding:'9px 12px', fontWeight:700, color:'#111827', whiteSpace:'nowrap'}}>{r.tokenSymbol||r.tokenName}</td>
                        <td style={{padding:'9px 12px', color:'#0369A1', fontSize:12}}>{(r.chainLabels||[]).join(' / ')||'—'}</td>
                        <td style={{padding:'9px 12px', color:'#374151', fontSize:12, maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{r.chainOnly?'仅上链':(r.quoteCurrencies||[]).length>0?(r.quoteCurrencies).map(q=>`${r.tokenSymbol||r.tokenName}/${q}`).join(', '):r.tokenName}</td>
                        <td style={{padding:'9px 12px'}}>
                          <span style={{background:isCancelled?'#F3F4F6':siteInfo?.bg, color:siteColor, fontWeight:700, fontSize:11, padding:'2px 8px', borderRadius:99, border:`1px solid ${siteColor}40`, whiteSpace:'nowrap'}}>{siteInfo?.icon} {r.site}</span>
                        </td>
                        <td style={{padding:'9px 12px', color:'#374151', fontSize:12, whiteSpace:'nowrap'}}>{prodInfo?.icon} {r.product}{r.stableHub?' +SH':''}{r.launchpool?' +LP':''}</td>
                        <td style={{padding:'9px 12px', color:'#6B7280', fontSize:12}}>{r.expectedMM||'—'}</td>
                        <td style={{padding:'9px 12px', fontSize:12}}>
                          {r.blocker ? <span style={{background:'#FFF7ED', color:'#C2410C', border:'1px solid #FED7AA', borderRadius:5, fontSize:11, padding:'1px 7px', fontWeight:600}} title={r.blocker}>🚧 {blockerDisplay}</span> : <span style={{color:'#D1D5DB'}}>—</span>}
                        </td>
                        <td style={{padding:'9px 12px', color:'#D97706', fontSize:12, fontWeight:600, whiteSpace:'nowrap'}}>{fmtLaunchTime(r.expectedLaunchTime)||'—'}</td>
                        <td style={{padding:'9px 12px'}}>
                          <div style={{display:'flex', alignItems:'center', gap:6}}>
                            <span style={{fontSize:12, fontWeight:600, color:'#374151', whiteSpace:'nowrap'}}>{done}/{total}</span>
                            <div style={{width:60, background:'#E5E7EB', borderRadius:99, height:5, overflow:'hidden', flexShrink:0}}>
                              <div style={{width:`${pct}%`, height:'100%', background:pct===100?'#059669':isCancelled?'#D1D5DB':siteColor, borderRadius:99}}/>
                            </div>
                          </div>
                        </td>
                        <td style={{padding:'9px 12px'}}>
                          <span style={{background:sm.bg, color:sm.color, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99, whiteSpace:'nowrap'}}>{sm.label}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:'8px 14px', background:'#F8FAFC', borderTop:'1px solid #E5E7EB', fontSize:12, color:'#9CA3AF'}}>共 {sorted.length} 条记录</div>
          </div>
          ) : (
          // ── 列表模式：单列 ──
          <div style={{display:'flex', flexDirection:'column', gap:7}}>
            {sorted.map(r => {
              const checklist = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
              const done = Object.values(r.checked||{}).filter(Boolean).length;
              const pct = checklist.length ? Math.round(done/checklist.length*100) : 0;
              const status = getRecordStatus(r, checklist.length);
              const sm = STATUS_META[status];
              const isGrid = false;
              const isCancelled = status === 'cancelled';
              const siteInfo = SITES.find(s=>s.id===r.site);
              const prodInfo = PRODUCTS.find(p=>p.id===r.product);
              const siteColor = siteInfo?.color || '#6B7280';
              const pendingCritical = isCancelled ? [] : checklist
                .map((step,i)=>({...step,idx:i}))
                .filter(step=>step.critical && !(r.checked||{})[step.idx]);
              return (
                <div key={r.id} className="hover-card" style={{
                  background: isCancelled ? '#FAFAFA' : 'white', borderRadius:10,
                  boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
                  border: pendingCritical.length>0 && !isCancelled ? '1px solid #FECACA' : '1px solid #E5E7EB',
                  borderLeft:`4px solid ${isCancelled?'#D1D5DB':siteColor}`,
                  cursor:'pointer', transition:'all 0.15s', overflow:'hidden',
                  opacity: isCancelled ? 0.55 : 1,
                }} onClick={()=>onOpen(r.id)}>
                  <div style={{display:'flex', alignItems:'center', gap:12, padding:'12px 16px'}}>
                    <ProgressRing pct={pct} />
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:'flex', alignItems:'center', gap:7, flexWrap:'wrap'}}>
                        <span style={{fontWeight:800, fontSize:16, color:'#111827'}}>{r.tokenName}</span>
                        <span style={{background:isCancelled?'#F3F4F6':siteInfo?.bg, color:siteColor, fontSize:11, fontWeight:800, padding:'2px 9px', borderRadius:99, border:`1px solid ${siteColor}40`}}>{siteInfo?.icon} {r.site}</span>
                        <span style={{background:'#F3F4F6', color:'#374151', fontSize:11, fontWeight:600, padding:'2px 9px', borderRadius:99}}>{prodInfo?.icon} {r.product}{r.stableHub?' +SH':''}{r.launchpool?' +LP':''}</span>
                        <span style={{background:sm.bg, color:sm.color, fontSize:11, fontWeight:700, padding:'2px 9px', borderRadius:99}}>{sm.label}</span>
                        {pendingCritical.length>0 && <span style={{background:'#FEE2E2', color:'#DC2626', fontSize:11, fontWeight:700, padding:'2px 9px', borderRadius:99}}>⚠ {pendingCritical.length} 关键项</span>}
                      </div>
                      <div style={{display:'flex', gap:8, marginTop:5, alignItems:'center', flexWrap:'wrap'}}>
                        <span style={{fontSize:12, color:'#4B5563'}}>{r.tokenType==='newchain'?'⛓️ 新链':'🪙 子代币'}</span>
                        {r.expectedMM && <span style={{fontSize:11, color:'#6B7280'}}>MM: {r.expectedMM}</span>}
                        {r.chainOnly && <span style={{fontSize:11, background:'#EDE9FE', color:'#7C3AED', border:'1px solid #DDD6FE', borderRadius:5, padding:'1px 7px', fontWeight:600}}>仅上链</span>}
                        {(r.chainLabels||[]).map((tag,i)=>(
                          <span key={i} style={{fontSize:11, background:'#F3F4F6', color:'#374151', border:'1px solid #E5E7EB', borderRadius:5, padding:'1px 7px', fontWeight:500}}>{tag}</span>
                        ))}
                        {/* Blocker pill */}
                        {r.blocker && <span style={{background:'#FFF7ED', color:'#C2410C', border:'1px solid #FED7AA', borderRadius:5, fontSize:11, padding:'1px 7px', fontWeight:600}}>🚧 {r.blocker}</span>}
                        {/* Blocker quick-edit */}
                        <span onClick={e=>e.stopPropagation()}>
                          {editingBlockerId===r.id ? (
                            <span style={{display:'flex', alignItems:'center', gap:4}}>
                              <input autoFocus value={blockerInputVal} onChange={e=>setBlockerInputVal(e.target.value)}
                                onKeyDown={e=>{if(e.key==='Enter'){onUpdate({...r,blocker:blockerInputVal.trim(),updatedAt:new Date().toISOString()});setEditingBlockerId(null);}if(e.key==='Escape')setEditingBlockerId(null);}}
                                placeholder="卡点说明..."
                                style={{fontSize:11, border:'1.5px solid #FB923C', borderRadius:5, padding:'2px 6px', fontFamily:'inherit', outline:'none', width:120}}/>
                              <button onClick={()=>{onUpdate({...r,blocker:blockerInputVal.trim(),updatedAt:new Date().toISOString()});setEditingBlockerId(null);}} style={{background:'#C2410C', color:'white', border:'none', borderRadius:4, padding:'2px 7px', fontSize:11, cursor:'pointer', fontWeight:700}}>保存</button>
                              <button onClick={()=>setEditingBlockerId(null)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:4, padding:'2px 6px', fontSize:11, cursor:'pointer', color:'#6B7280'}}>✕</button>
                            </span>
                          ) : (
                            <span onClick={()=>{setEditingBlockerId(r.id);setBlockerInputVal(r.blocker||'');}} style={{fontSize:11, color:'#9CA3AF', cursor:'pointer'}} title="编辑卡点">✏</span>
                          )}
                        </span>
                        <span style={{fontSize:12, color:'#9CA3AF'}}>更新 {fmtDate(r.updatedAt)}</span>
                        {status==='in_progress' && (
                          <span style={{display:'flex', alignItems:'center', gap:5}} onClick={e=>e.stopPropagation()}>
                            <span style={{fontSize:12, color:'#374151', fontWeight:600}}>🗓 预期上线：</span>
                            {editingLaunchId===r.id ? (
                              <span style={{display:'flex', alignItems:'center', gap:5}}>
                                <input type="datetime-local" value={launchInputVal} onChange={e=>setLaunchInputVal(e.target.value)} step="3600"
                                  style={{fontSize:12, border:'1.5px solid #2E75B6', borderRadius:6, padding:'2px 8px', fontFamily:'inherit', outline:'none'}}/>
                                <button onClick={()=>{
                                  const iso = launchInputVal ? new Date(launchInputVal).toISOString() : null;
                                  onUpdate({...r, expectedLaunchTime:iso, updatedAt:new Date().toISOString()});
                                  setEditingLaunchId(null);
                                }} style={{background:C.blue, color:'white', border:'none', borderRadius:6, padding:'3px 10px', fontSize:12, cursor:'pointer', fontWeight:700}}>保存</button>
                                <button onClick={()=>setEditingLaunchId(null)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:6, padding:'3px 8px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>取消</button>
                              </span>
                            ) : (
                              <span onClick={()=>{setEditingLaunchId(r.id); setLaunchInputVal(toInputVal(r.expectedLaunchTime));}}
                                style={{fontSize:12, color:r.expectedLaunchTime?'#D97706':'#9CA3AF', fontWeight:r.expectedLaunchTime?700:400, cursor:'pointer', borderBottom:'1px dashed currentColor', paddingBottom:1}}>
                                {fmtLaunchTime(r.expectedLaunchTime) || '点击设置'}
                              </span>
                            )}
                          </span>
                        )}
                      </div>
                      <div style={{display:'flex', alignItems:'center', gap:8, marginTop:6}}>
                        <div style={{flex:1, background:'#E5E7EB', borderRadius:99, height:5, overflow:'hidden', maxWidth:260}}>
                          <div style={{width:`${pct}%`, height:'100%', background:pct===100?'#059669':isCancelled?'#D1D5DB':siteColor, borderRadius:99, transition:'width 0.3s'}}/>
                        </div>
                        <span style={{fontSize:11, color:'#9CA3AF', whiteSpace:'nowrap'}}>{done}/{checklist.length} 步骤</span>
                      </div>
                    </div>
                    {isCancelled
                      ? <button className="btn" onClick={e=>{e.stopPropagation();onRestore(r.id);}} style={{background:'none', border:'1px solid #D1FAE5', color:'#059669', borderRadius:8, padding:'4px 10px', cursor:'pointer', fontSize:12, fontWeight:700, flexShrink:0}}>↩ 恢复</button>
                      : <button className="btn" onClick={e=>openCancelModal(e,r.id)} style={{background:'none', border:'1px solid #E5E7EB', color:'#9CA3AF', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:14, flexShrink:0}} title="取消">✕</button>
                    }
                  </div>
                  {isCancelled && r.cancelReason && (
                    <div style={{borderTop:'1px solid #F3F4F6', background:'#FAFAFA', padding:'6px 16px 6px 20px', display:'flex', gap:8, alignItems:'center'}}>
                      <span style={{fontSize:11, fontWeight:700, color:'#9CA3AF', flexShrink:0}}>取消原因</span>
                      <span style={{fontSize:12, color:'#6B7280'}}>{r.cancelReason}</span>
                    </div>
                  )}
                  {pendingCritical.length>0 && (
                    <div style={{borderTop:'1px solid #FEE2E2', background:'#FFF7F7', padding:'7px 16px 7px 20px', display:'flex', flexDirection:'column', gap:4}}>
                      <div style={{fontSize:11, fontWeight:700, color:'#B91C1C', letterSpacing:0.3}}>PENDING 关键项</div>
                      {pendingCritical.slice(0,3).map((step,i)=>(
                        <div key={i} style={{display:'flex', alignItems:'baseline', gap:7}}>
                          <span style={{width:14, height:14, borderRadius:3, border:'1.5px solid #FCA5A5', display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                            <span style={{fontSize:8, color:'#EF4444'}}>✕</span>
                          </span>
                          <span style={{fontSize:12, color:'#374151', fontWeight:600}}>{step.task}</span>
                          <span style={{fontSize:11, color:'#9CA3AF', flexShrink:0}}>— {step.contact.split('\n')[0]}</span>
                        </div>
                      ))}
                      {pendingCritical.length>3 && <div style={{fontSize:11, color:'#EF4444'}}>还有 {pendingCritical.length-3} 项...</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── New Listing Wizard ───────────────────────────────────────────────────────
function NewListingWizard({ onSave, onCancel, existingRecords, onOpenExisting }) {
  const [site, setSite] = useState(null);
  const [products, setProducts] = useState([]); // multi-select
  const [tokenType, setTokenType] = useState(null);
  const [tokenSymbol, setTokenSymbol] = useState('');
  const [quoteCurrencies, setQuoteCurrencies] = useState([]); // selected quote currencies
  const [chainOnly, setChainOnly] = useState(false);          // 仅上链
  const [chains, setChains] = useState([]);
  const [customChain, setCustomChain] = useState('');
  const [userType, setUserType] = useState('');
  const [expectedMM, setExpectedMM] = useState('');
  const [wizardLaunchTime, setWizardLaunchTime] = useState('');
  const [stableHub, setStableHub] = useState(null);
  const [launchpool, setLaunchpool] = useState(null);
  const [dupWarning, setDupWarning] = useState(null);

  const QUOTE_OPTIONS = ['USD','USDT','USDC','BTC','HKD','IDR'];
  const [customQuote, setCustomQuote] = useState('');
  const addCustomQuote = () => {
    const v = customQuote.trim().toUpperCase();
    if (!v || quoteCurrencies.includes(v)) { setCustomQuote(''); return; }
    setQuoteCurrencies(prev=>[...prev, v]);
    setCustomQuote('');
  };
  const toggleQuote = (q) => {
    if (chainOnly) return;
    setQuoteCurrencies(prev => prev.includes(q) ? prev.filter(x=>x!==q) : [...prev,q]);
  };
  const toggleChainOnly = () => {
    setChainOnly(v => { if (!v) setQuoteCurrencies([]); return !v; });
  };

  const toggleProduct = (id) => {
    setProducts(prev => prev.includes(id) ? prev.filter(p=>p!==id) : [...prev, id]);
    if (id==='RFQ' && products.includes('RFQ')) setStableHub(null); // deselecting RFQ clears StableHub
  };
  const needsStableHub  = site==='Global' && products.includes('RFQ');
  const needsLaunchpool = site==='ID' && products.length > 0;
  const canCreate = site && products.length > 0 && tokenType && tokenSymbol.trim()
    && (!needsStableHub  || stableHub  !== null)
    && (!needsLaunchpool || launchpool !== null);

  const toggleChain = (id) => setChains(prev => prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]);
  const addCustomChain = () => {
    const v = customChain.trim();
    if (!v) return;
    const id = 'CUSTOM_'+v.toUpperCase();
    if (!chains.includes(id)) setChains(prev=>[...prev, id]);
    setCustomChain('');
  };
  // Derive display name
  const derivedName = () => {
    const sym = tokenSymbol.trim();
    if (!sym) return '';
    if (chainOnly) return `${sym}（仅上链）`;
    if (quoteCurrencies.length > 0) return quoteCurrencies.map(q=>`${sym}/${q}`).join(', ');
    return sym;
  };

  const doCreate = () => {
    const lp = needsLaunchpool ? !!launchpool : false;
    const chainLabels = chains.map(id => {
      const c = CHAINS.find(c=>c.id===id);
      return c ? c.tag : id.replace('CUSTOM_','');
    });
    const launchIso = wizardLaunchTime ? new Date(wizardLaunchTime).toISOString() : null;
    const newRecords = products.map(prod => {
      const sh = (site==='Global' && prod==='RFQ') ? !!stableHub : false;
      return {
        id: genId(),
        tokenName: derivedName(),
        tokenSymbol: tokenSymbol.trim(),
        quoteCurrencies, chainOnly,
        chains, chainLabels,
        userType, expectedMM,
        expectedLaunchTime: launchIso,
        site, product: prod, tokenType, stableHub: sh, launchpool: lp,
        blocker: '', checked: {}, notes: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        estimatedTime: estimateTime(site, prod, tokenType),
      };
    });
    onSave(newRecords);
  };

  const handleCreate = () => {
    if (!canCreate) return;
    const sym = tokenSymbol.trim().toLowerCase();
    const allMatches = [];
    products.forEach(prod => {
      const m = (existingRecords || []).filter(r =>
        (r.tokenSymbol||r.tokenName).trim().toLowerCase() === sym &&
        r.site === site && r.product === prod
      );
      allMatches.push(...m);
    });
    if (allMatches.length > 0) setDupWarning({ matches: allMatches });
    else doCreate();
  };

  const sInfo = SITES.find(s=>s.id===site);

  return (
    <div>
      {/* Duplicate warning modal */}
      {dupWarning && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:460, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
              <span style={{fontSize:22}}>⚠️</span>
              <div style={{fontWeight:800, fontSize:17, color:'#92400E'}}>疑似重复任务</div>
            </div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:16}}>
              已找到 <strong>{dupWarning.matches.length}</strong> 条相同币种 + 站点 + 产品的记录，可能是重复创建：
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:20}}>
              {dupWarning.matches.map(r => {
                const cl = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
                const st = getRecordStatus(r, cl.length);
                const sm = STATUS_META[st];
                const done = Object.values(r.checked||{}).filter(Boolean).length;
                return (
                  <div key={r.id} style={{background:'#FFFBEB', border:'1px solid #FDE68A', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700, fontSize:14, color:'#111827'}}>{r.tokenName}</div>
                      <div style={{fontSize:12, color:'#6B7280', marginTop:2}}>
                        {SITES.find(s=>s.id===r.site)?.icon} {r.site} · {r.product} · 创建于 {fmtDate(r.createdAt)}
                      </div>
                      <div style={{fontSize:12, marginTop:3}}>
                        <span style={{background:sm.bg, color:sm.color, padding:'1px 8px', borderRadius:99, fontWeight:700}}>{sm.label}</span>
                        <span style={{color:'#9CA3AF', marginLeft:8}}>{done}/{cl.length} 步骤已完成</span>
                      </div>
                    </div>
                    <button onClick={()=>{ setDupWarning(null); onOpenExisting(r.id); }} style={{background:'none', border:'1px solid #D1FAE5', color:'#059669', borderRadius:8, padding:'6px 12px', fontSize:12, cursor:'pointer', fontWeight:700, whiteSpace:'nowrap'}}>查看</button>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={()=>setDupWarning(null)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>返回修改</button>
              <button onClick={()=>{ setDupWarning(null); doCreate(); }} style={{border:'none', background:'#2E75B6', color:'white', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:'pointer', fontWeight:700}}>仍然创建</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:C.navy, padding:'16px 24px', display:'flex', alignItems:'center', gap:16}}>
        <button className="btn" onClick={onCancel} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>← 返回</button>
        <div style={{color:'white', fontWeight:700, fontSize:16}}>新建上币任务</div>
      </div>

      <div style={{maxWidth:700, margin:'0 auto', padding:'24px 16px'}}>
        {/* Token info — 3 sections */}
        <div style={{background:'white', borderRadius:16, padding:24, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', marginBottom:16}}>
          <div style={{fontSize:14, fontWeight:700, color:'#374151', marginBottom:16}}>币种信息</div>

          {/* 币种代号 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>
              币种代号 <span style={{color:'#DC2626'}}>*</span>
            </div>
            <input value={tokenSymbol} onChange={e=>setTokenSymbol(e.target.value)}
              placeholder="例如：BTC、ETH、DOGE"
              style={{width:'100%', border:'2px solid #E5E7EB', borderRadius:10, padding:'11px 14px', fontSize:15, fontFamily:'inherit'}}/>
          </div>

          {/* 交易对（右币多选 + 仅上链） */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:8}}>
