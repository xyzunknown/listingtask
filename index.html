// ─── Checklist View ────────────────────────────────────────────────────────────
function ChecklistView({ record, onBack, onUpdate, addToast }) {
  const checklist = useMemo(()=>buildChecklist(record.site, record.product, record.tokenType, {stableHub: record.stableHub, launchpool: record.launchpool}),[record]);
  const [expandedSteps, setExpandedSteps] = useState({});
  const [editNote, setEditNote] = useState(false);
  const [noteText, setNoteText] = useState(record.notes||'');
  const [showCancelModal, setShowCancelModal] = useState(false);
  const [cancelReason, setCancelReason] = useState('');
  const [showEditModal, setShowEditModal] = useState(false);
  const [editTokenName, setEditTokenName] = useState(record.tokenName||'');
  const [editExpectedMM, setEditExpectedMM] = useState(record.expectedMM||'');
  const [editUserType, setEditUserType] = useState(record.userType||'');
  const [editBlocker, setEditBlocker] = useState(record.blocker||'');
  const [editLaunchTime, setEditLaunchTime] = useState(toInputVal(record.expectedLaunchTime));

  const checked = record.checked || {};
  const done = Object.values(checked).filter(Boolean).length;
  const total = checklist.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const isCancelled = !!record.cancelled;
  const isComplete = !isCancelled && done===total && total>0;

  const handleCancelConfirm = () => {
    if (!cancelReason.trim()) return;
    onUpdate({...record, cancelled: true, cancelReason: cancelReason.trim(), updatedAt: new Date().toISOString()});
    setShowCancelModal(false);
    setCancelReason('');
  };
  const handleRestore = () => {
    onUpdate({...record, cancelled: false, cancelReason: '', updatedAt: new Date().toISOString()});
  };

  const toggle = (idx) => {
    const newChecked = {...checked, [idx]: !checked[idx]};
    const updated = {...record, checked:newChecked, updatedAt:new Date().toISOString()};
    const step = checklist[idx];
    const nowDone = !checked[idx];
    const newTotal = Object.values(newChecked).filter(Boolean).length;
    let msg = nowDone ? `✅ ${step.task.slice(0,28)}` : `↩ 撤销：${step.task.slice(0,24)}`;
    if (nowDone && newTotal === checklist.length) msg = `🎉 ${record.tokenName} 全部完成！`;
    onUpdate(updated, msg);
  };

  const openEditModal = () => {
    setEditTokenName(record.tokenName||'');
    setEditExpectedMM(record.expectedMM||'');
    setEditUserType(record.userType||'');
    setEditBlocker(record.blocker||'');
    setEditLaunchTime(toInputVal(record.expectedLaunchTime));
    setShowEditModal(true);
  };
  const saveEditModal = () => {
    const iso = editLaunchTime ? new Date(editLaunchTime).toISOString() : null;
    onUpdate({...record, tokenName:editTokenName, expectedMM:editExpectedMM, userType:editUserType, blocker:editBlocker, expectedLaunchTime:iso, updatedAt:new Date().toISOString()}, '✏ 记录信息已更新');
    setShowEditModal(false);
  };

  const saveNote = () => {
    onUpdate({...record, notes:noteText, updatedAt:new Date().toISOString()}, `📝 备注已更新：${record.tokenName}`);
    setEditNote(false);
  };

  // Group by phase
  const phases = [];
  let cur = null;
  checklist.forEach((step,i)=>{
    if (!cur || cur.name!==step.phase) { cur={name:step.phase,tag:step.tag,steps:[]}; phases.push(cur); }
    cur.steps.push({...step,idx:i});
  });

  const siteInfo = SITES.find(s=>s.id===record.site);
  const prodInfo = PRODUCTS.find(p=>p.id===record.product);

  return (
    <div>
      {/* Edit info modal */}
      {showEditModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:460, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:16}}>✏ 编辑记录信息</div>
            <div style={{display:'flex', flexDirection:'column', gap:14}}>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>任务名称</div>
                <input value={editTokenName} onChange={e=>setEditTokenName(e.target.value)}
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>做市商（MM）</div>
                <input value={editExpectedMM} onChange={e=>setEditExpectedMM(e.target.value)}
                  placeholder="例如：Wintermute、GSR..."
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>用户类型</div>
                <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                  {['PI（专业投资者）','零售 Retail','两者','不适用'].map(opt=>(
                    <button key={opt} onClick={()=>setEditUserType(editUserType===opt?'':opt)} style={{
                      border:`1.5px solid ${editUserType===opt?C.navy:'#E5E7EB'}`,
                      borderRadius:8, padding:'6px 12px', cursor:'pointer',
                      background: editUserType===opt?'#D6E4F0':'white',
                      fontSize:12, fontWeight: editUserType===opt?700:400,
                      color: editUserType===opt?C.navy:'#374151',
                    }}>{opt}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>当前卡点</div>
                <input value={editBlocker} onChange={e=>setEditBlocker(e.target.value)}
                  placeholder="例如：等待合规尽调、LP未确认..."
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>期望上线时间</div>
                <input type="datetime-local" value={editLaunchTime} onChange={e=>setEditLaunchTime(e.target.value)} step="3600"
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
            </div>
            <div style={{fontSize:12, color:'#9CA3AF', marginTop:12, marginBottom:4}}>注：站点、产品、代币类型不可编辑（影响清单结构）</div>
            <div style={{display:'flex', gap:10, marginTop:12, justifyContent:'flex-end'}}>
              <button onClick={()=>setShowEditModal(false)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>取消</button>
              <button onClick={saveEditModal} style={{border:'none', background:'#2E75B6', color:'white', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:'pointer', fontWeight:700}}>保存</button>
            </div>
          </div>
        </div>
      )}
      {/* Cancel reason modal */}
      {showCancelModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:440, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>取消上币任务</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>进度数据会完整保留，可随时恢复。请说明取消原因：</div>
            <textarea
              autoFocus
              value={cancelReason}
              onChange={e=>setCancelReason(e.target.value)}
              placeholder="例如：项目方撤回申请、合规未通过、暂缓上线..."
              rows={4}
              style={{width:'100%', border:'2px solid #E5E7EB', borderRadius:10, padding:'10px 12px', fontSize:14, fontFamily:'inherit', resize:'vertical', outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#2E75B6'}
              onBlur={e=>e.target.style.borderColor='#E5E7EB'}
            />
            <div style={{display:'flex', gap:10, marginTop:16, justifyContent:'flex-end'}}>
              <button onClick={()=>setShowCancelModal(false)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>返回</button>
              <button onClick={handleCancelConfirm} disabled={!cancelReason.trim()} style={{border:'none', background: cancelReason.trim() ? '#DC2626' : '#F3F4F6', color: cancelReason.trim() ? 'white' : '#9CA3AF', borderRadius:9, padding:'9px 20px', fontSize:13, cursor: cancelReason.trim() ? 'pointer' : 'not-allowed', fontWeight:700}}>确认取消</button>
            </div>
          </div>
        </div>
      )}
      {/* Header */}
      <div style={{background:C.navy, padding:'16px 24px'}} className="no-print">
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:12}}>
          <button className="btn" onClick={onBack} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>← 返回列表</button>
          <button className="btn" onClick={()=>window.print()} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>🖨 打印</button>
          <button className="btn" onClick={openEditModal} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>✏ 编辑信息</button>
          {isCancelled
            ? <button className="btn" onClick={handleRestore} style={{marginLeft:'auto', background:'rgba(16,185,129,0.25)', border:'1px solid rgba(16,185,129,0.5)', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13, fontWeight:600}}>↩ 恢复任务</button>
            : <button className="btn" onClick={()=>{setCancelReason('');setShowCancelModal(true);}} style={{marginLeft:'auto', background:'rgba(220,38,38,0.25)', border:'1px solid rgba(220,38,38,0.5)', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13, fontWeight:600}}>✕ 取消任务</button>
          }
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{color:'white', fontWeight:800, fontSize:18}}>{record.tokenName}</div>
          {isCancelled && <span style={{background:'rgba(156,163,175,0.35)', color:'white', fontSize:12, fontWeight:700, padding:'2px 10px', borderRadius:99, border:'1px solid rgba(255,255,255,0.3)'}}>已取消</span>}
        </div>
        <div style={{color:'rgba(255,255,255,0.7)', fontSize:13, marginTop:3}}>
          {siteInfo?.icon} {siteInfo?.label} · {prodInfo?.icon} {prodInfo?.label} · {record.tokenType==='newchain'?'⛓️ 新链':'🪙 子代币'} · 预计 {record.estimatedTime}
        </div>
      </div>

      <div style={{maxWidth:900, margin:'0 auto', padding:'20px 16px'}}>
        {/* Progress */}
        <div style={{background:'white', borderRadius:14, padding:'16px 20px', marginBottom:14, boxShadow:'0 1px 6px rgba(0,0,0,0.05)', display:'flex', alignItems:'center', gap:16}}>
          <ProgressRing pct={pct} size={56} stroke={5}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700, color: isCancelled?'#9CA3AF':isComplete?C.green:C.navy, fontSize:15}}>
              {isCancelled ? '🚫 已取消' : isComplete ? '🎉 全部完成！' : `${done} / ${total} 步骤完成`}
            </div>
            <div style={{background:'#E5E7EB', borderRadius:99, height:7, marginTop:8, overflow:'hidden'}}>
              <div style={{width:`${pct}%`, height:'100%', background:isComplete?'#059669':'#2E75B6', borderRadius:99, transition:'width 0.3s'}}/>
            </div>
          </div>
          <div style={{fontSize:12, color:'#9CA3AF', textAlign:'right'}}>
            <div>创建：{fmtDate(record.createdAt)}</div>
            <div>更新：{fmtDate(record.updatedAt)}</div>
          </div>
        </div>

        {/* Cancelled banner */}
        {isCancelled && record.cancelReason && (
          <div style={{background:'#FEF2F2', border:'1px solid #FECACA', borderRadius:12, padding:'12px 16px', marginBottom:14, display:'flex', gap:10, alignItems:'flex-start'}}>
            <span style={{fontSize:16, flexShrink:0}}>🚫</span>
            <div>
              <div style={{fontSize:12, fontWeight:700, color:'#B91C1C', marginBottom:2}}>取消原因</div>
              <div style={{fontSize:13, color:'#374151'}}>{record.cancelReason}</div>
            </div>
          </div>
        )}

        {/* Notes */}
        <div style={{background:'white', borderRadius:14, padding:'14px 18px', marginBottom:14, boxShadow:'0 1px 6px rgba(0,0,0,0.05)', border:'1px solid #E5E7EB'}} className="no-print">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: editNote?10:0}}>
            <span style={{fontSize:13, fontWeight:700, color:'#374151'}}>📝 任务备注</span>
            {!editNote ? (
              <button onClick={()=>setEditNote(true)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:7, padding:'4px 10px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>编辑</button>
            ) : (
              <div style={{display:'flex', gap:6}}>
                <button onClick={()=>{setEditNote(false);setNoteText(record.notes||'');}} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:7, padding:'4px 10px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>取消</button>
                <button onClick={saveNote} style={{background:C.blue, border:'none', borderRadius:7, padding:'4px 12px', fontSize:12, cursor:'pointer', color:'white', fontWeight:700}}>保存</button>
              </div>
            )}
          </div>
          {editNote ? (
            <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} rows={3}
              placeholder="记录进展、特殊说明、联系结果..."
              style={{width:'100%', border:'2px solid #E5E7EB', borderRadius:8, padding:'10px', fontSize:13, fontFamily:'inherit', resize:'vertical'}}/>
          ) : (
            noteText ? <div style={{fontSize:13, color:'#4B5563', marginTop:6, lineHeight:1.6}}>{noteText}</div>
                     : <div style={{fontSize:12, color:'#D1D5DB', marginTop:2}}>点击编辑添加备注...</div>
          )}
        </div>

        {/* Phase groups */}
        {phases.map((phase,pi)=>{
          const pc = PHASE_COLORS[phase.tag]||PHASE_COLORS.exec;
          const pd = phase.steps.filter(s=>checked[s.idx]).length;
          return (
            <div key={pi} style={{marginBottom:12}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6, padding:'0 4px'}}>
                <div style={{background:pc.border, borderRadius:99, padding:'3px 12px', fontSize:12, fontWeight:700, color:'white'}}>{phase.name}</div>
                <div style={{fontSize:12, color:'#9CA3AF'}}>{pd}/{phase.steps.length} 完成</div>
              </div>
              {phase.steps.map(step=>{
                const isDone = !!checked[step.idx];
                const isExp = !!expandedSteps[step.idx];
                const hasNote = step.note && step.note.trim();
                return (
                  <div key={step.idx} style={{
                    background: isDone?'#F0FDF4':'white',
                    border:`1px solid ${isDone?'#86EFAC':step.critical?'#FCA5A5':'#E5E7EB'}`,
                    borderLeft:`4px solid ${isDone?'#22C55E':step.critical?'#EF4444':pc.border}`,
                    borderRadius:10, marginBottom:8, overflow:'hidden',
                    boxShadow:'0 1px 4px rgba(0,0,0,0.04)', transition:'all 0.15s',
                  }}>
                    <div style={{display:'flex', alignItems:'flex-start', padding:'12px 14px', gap:12, cursor:'pointer'}}
                      onClick={()=>toggle(step.idx)}>
                      <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isDone?'#22C55E':'#D1D5DB'}`,
                        background:isDone?'#22C55E':'white',display:'flex',alignItems:'center',justifyContent:'center',
                        flexShrink:0,marginTop:1,transition:'all 0.15s'}}>
                        {isDone && <span style={{color:'white',fontSize:13,fontWeight:900}}>✓</span>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                          <span style={{fontWeight:700,fontSize:14,color:isDone?'#6B7280':'#111827',textDecoration:isDone?'line-through':'none'}}>
                            {step.idx+1}. {step.task}
                          </span>
                          {step.critical && !isDone && <span style={{background:'#FEE2E2',color:'#DC2626',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:99}}>关键</span>}
                        </div>
                        <div style={{display:'flex',gap:12,marginTop:5,flexWrap:'wrap'}}>
                          <span style={{fontSize:12,color:'#4B5563'}}>👤 {step.owner}</span>
                          <span style={{fontSize:12,color:'#2E75B6',fontWeight:600}}>📞 {step.contact}</span>
                          <span style={{fontSize:12,color:'#6B7280'}}>⏱ {step.time}</span>
                        </div>
                      </div>
                      {hasNote && (
                        <button onClick={e=>{e.stopPropagation();setExpandedSteps(p=>({...p,[step.idx]:!p[step.idx]}));}}
                          style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#9CA3AF',flexShrink:0,padding:'0 4px'}}>
                          {isExp?'▲':'▼'}
                        </button>
                      )}
                    </div>
                    {hasNote && isExp && (
                      <div style={{background:'#F8FAFC',borderTop:'1px solid #E5E7EB',padding:'10px 14px 10px 50px'}}>
                        {step.note.split('\n').map((l,i)=>(
                          <div key={i} style={{fontSize:12,color:'#4B5563',lineHeight:1.6}}>{l}</div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Completed Table ──────────────────────────────────────────────────────────
function CompletedTable({ records, onBack }) {
  const [copied, setCopied] = useState(false);

  const completed = records.filter(r => getRecordStatus(r, buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool}).length) === 'completed');

  const COLS = ['Token','区块链','交易对','站点','交易类型','用户类型','上线时间'];
  const toRow = r => [
    r.tokenSymbol || r.tokenName,
    (r.chainLabels||[]).join(' / ') || '—',
    r.chainOnly ? '仅上链' : (r.quoteCurrencies||[]).length>0 ? (r.quoteCurrencies).map(q=>`${r.tokenSymbol||r.tokenName}/${q}`).join(', ') : r.tokenName,
    r.site,
    r.product + (r.stableHub?' +SH':''),
    r.userType || '—',
    r.expectedLaunchTime ? fmtLaunchTime(r.expectedLaunchTime) : fmtDate(r.updatedAt),
  ];

  const exportExcel = () => {
    const ws = XLSX.utils.aoa_to_sheet([COLS, ...completed.map(toRow)]);
    // Column widths
    ws['!cols'] = [16,20,30,10,14,16,16].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '已完成上币');
    XLSX.writeFile(wb, `OSL已完成上币_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const copyTSV = () => {
    const lines = [COLS, ...completed.map(toRow)].map(r=>r.join('\t')).join('\n');
    navigator.clipboard.writeText(lines).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false), 2000);
    });
  };

  return (
    <div>
      <div style={{background:C.navy, padding:'16px 24px', display:'flex', alignItems:'center', gap:16}}>
        <button className="btn" onClick={onBack} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>← 返回</button>
        <div style={{color:'white', fontWeight:700, fontSize:16}}>已完成上币记录</div>
        <div style={{marginLeft:'auto', display:'flex', gap:8}}>
          <button onClick={copyTSV} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 16px', cursor:'pointer', fontSize:13, fontWeight:600}}>
            {copied ? '✓ 已复制' : '📋 一键复制'}
          </button>
          <button onClick={exportExcel} style={{background:'#059669', border:'none', color:'white', borderRadius:8, padding:'7px 16px', cursor:'pointer', fontSize:13, fontWeight:700}}>
            ⬇ 导出 Excel
          </button>
        </div>
      </div>
      <div style={{maxWidth:1000, margin:'0 auto', padding:'20px 16px'}}>
        {completed.length === 0 ? (
          <div style={{textAlign:'center', padding:'60px 0', color:'#9CA3AF'}}>
            <div style={{fontSize:40, marginBottom:12}}>🎉</div>
            <div style={{fontSize:15, fontWeight:600}}>暂无已完成的上币任务</div>
          </div>
        ) : (
          <div style={{background:'white', borderRadius:14, overflow:'hidden', boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
              <thead>
                <tr style={{background:'#F8FAFC'}}>
                  {COLS.map(col=>(
                    <th key={col} style={{padding:'10px 14px', textAlign:'left', fontWeight:700, color:'#374151', borderBottom:'2px solid #E5E7EB', whiteSpace:'nowrap'}}>{col}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {completed.map((r,i)=>{
                  const row = toRow(r);
                  const siteInfo = SITES.find(s=>s.id===r.site);
                  return (
                    <tr key={r.id} style={{background: i%2===0?'white':'#F9FAFB', borderBottom:'1px solid #F3F4F6'}}>
                      <td style={{padding:'10px 14px', fontWeight:700, color:'#111827'}}>{row[0]}</td>
                      <td style={{padding:'10px 14px', color:'#0369A1'}}>{row[1]}</td>
                      <td style={{padding:'10px 14px', color:'#374151'}}>{row[2]}</td>
                      <td style={{padding:'10px 14px'}}>
                        <span style={{background:siteInfo?.bg, color:siteInfo?.color, fontWeight:700, fontSize:11, padding:'2px 8px', borderRadius:99}}>{siteInfo?.icon} {r.site}</span>
                      </td>
                      <td style={{padding:'10px 14px', color:'#374151'}}>{row[4]}</td>
                      <td style={{padding:'10px 14px', color:'#6B7280'}}>{row[5]}</td>
                      <td style={{padding:'10px 14px', color:'#D97706', fontWeight:600}}>{row[6]}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{padding:'10px 16px', background:'#F8FAFC', borderTop:'1px solid #E5E7EB', fontSize:12, color:'#9CA3AF'}}>
              共 {completed.length} 条记录
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── App shell ────────────────────────────────────────────────────────────────
function App() {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('dashboard');
  const [activeId, setActiveId] = useState(null);
  const [toasts, setToasts] = useState([]);

  // 初始加载 + 本地数据迁移 + 实时同步
  useEffect(() => {
    loadRecordsFromDB().then(async cloudData => {
      // 检查 localStorage 是否有旧数据需要迁移
      const LOCAL_KEY = 'osl_listing_records_v2';
      let localData = [];
      try { localData = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]'); } catch {}

      if (localData.length > 0) {
        // 有本地数据：把本地没有的条目上传到云端（避免覆盖云端已有的）
        const cloudIds = new Set(cloudData.map(r => r.id));
        const toMigrate = localData.filter(r => !cloudIds.has(r.id));
        if (toMigrate.length > 0) {
          await Promise.all(toMigrate.map(r => syncRecord(r)));
        }
        // 合并云端已有 + 本地迁移的
        const merged = [...cloudData, ...toMigrate];
        setRecords(merged);
        // 清除本地缓存，防止重复迁移
        localStorage.removeItem(LOCAL_KEY);
        if (toMigrate.length > 0) {
          setTimeout(() => addToast(`✅ 已将 ${toMigrate.length} 条本地任务迁移到云端`, 'success'), 500);
        }
      } else {
        setRecords(cloudData);
      }
      setLoading(false);
    });
    const channel = db.channel('listing-sync')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'listing_records' }, payload => {
        if (payload.eventType === 'DELETE') {
          setRecords(prev => prev.filter(r => r.id !== payload.old.id));
        } else {
          const incoming = payload.new.data;
          setRecords(prev => {
            const exists = prev.find(r => r.id === incoming.id);
            return exists ? prev.map(r => r.id === incoming.id ? incoming : r) : [...prev, incoming];
          });
        }
      }).subscribe();
    return () => db.removeChannel(channel);
  }, []);

  const addToast = (msg, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(prev=>[...prev, {id, msg, type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)), 3500);
  };

  const activeRecord = records.find(r=>r.id===activeId);

  const handleSave = (recordOrArr) => {
    const arr = Array.isArray(recordOrArr) ? recordOrArr : [recordOrArr];
    arr.forEach(r => syncRecord(r));
    setRecords(prev=>[...prev, ...arr]);
    if (arr.length === 1) {
      setActiveId(arr[0].id);
      setView('checklist');
      addToast(`🆕 已创建任务：${arr[0].tokenName}`, 'success');
    } else {
      setView('dashboard');
      addToast(`🆕 已创建 ${arr.length} 条任务：${arr.map(r=>r.product).join(' + ')}`, 'success');
    }
  };

  const handleUpdate = (updated, toastMsg='') => {
    setRecords(prev=>prev.map(r=>r.id===updated.id?updated:r));
    syncRecord(updated);
    if (toastMsg) addToast(toastMsg);
  };

  const handleDelete = (id, reason='') => {
    const r = records.find(r=>r.id===id);
    const updated = {...r, cancelled:true, cancelReason:reason, updatedAt:new Date().toISOString()};
    setRecords(prev=>prev.map(r=>r.id===id ? updated : r));
    syncRecord(updated);
    addToast(`⏸ 已取消：${r?.tokenName||''}`, 'warn');
  };

  const handleRestore = (id) => {
    const r = records.find(r=>r.id===id);
    const updated = {...r, cancelled:false, cancelReason:'', updatedAt:new Date().toISOString()};
    setRecords(prev=>prev.map(r=>r.id===id ? updated : r));
    syncRecord(updated);
    addToast(`↩ 已恢复：${r?.tokenName||''}`, 'success');
  };

  const handleImport = (arr) => {
    arr.forEach(r => syncRecord(r));
    setRecords(prev => [...prev, ...arr]);
    addToast(`📥 已导入 ${arr.length} 条记录`, 'success');
  };

  const handleOpen = (id) => { setActiveId(id); setView('checklist'); };
  const handleBack = () => { setActiveId(null); setView('dashboard'); };

  if (loading) return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', gap:16, color:'#6B7280'}}>
      <div style={{fontSize:36}}>⏳</div>
      <div style={{fontSize:16, fontWeight:600}}>正在加载数据...</div>
      <div style={{fontSize:13}}>连接到 Supabase 云端数据库</div>
    </div>
  );

  const TOAST_COLORS = { success:'#059669', warn:'#D97706', info:'#2E75B6', error:'#DC2626' };

  return (
    <div>
      {/* Toast notifications */}
      <div style={{position:'fixed', top:16, right:16, zIndex:9999, display:'flex', flexDirection:'column', gap:8, pointerEvents:'none'}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            background:'white', border:`1.5px solid ${TOAST_COLORS[t.type]||TOAST_COLORS.info}`,
            borderLeft:`4px solid ${TOAST_COLORS[t.type]||TOAST_COLORS.info}`,
            borderRadius:10, padding:'10px 16px', fontSize:13, fontWeight:600,
            color:'#111827', boxShadow:'0 4px 16px rgba(0,0,0,0.12)',
            maxWidth:320, animation:'slideIn 0.2s ease',
          }}>{t.msg}</div>
        ))}
      </div>
      <style>{`@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}`}</style>

      {view==='dashboard' && <Dashboard records={records} onOpen={handleOpen} onNew={()=>setView('new')} onDelete={handleDelete} onRestore={handleRestore} onUpdate={handleUpdate} onViewCompleted={()=>setView('completed')} onImport={handleImport}/>}
      {view==='new' && <NewListingWizard onSave={handleSave} onCancel={()=>setView('dashboard')} existingRecords={records} onOpenExisting={id=>{ setActiveId(id); setView('checklist'); }}/>}
      {view==='checklist' && activeRecord && <ChecklistView record={activeRecord} onBack={handleBack} onUpdate={handleUpdate} addToast={addToast}/>}
      {view==='completed' && <CompletedTable records={records} onBack={()=>setView('dashboard')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
