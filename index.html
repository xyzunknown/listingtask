    add('执行配置','exec','申请宣发 Banner','Marketing','Freya Yu / Teddy','上线前3天','向设计团队提交 Banner 需求（尺寸、品牌规范、内容要点），用于 App / 网站宣传');
    add('执行配置','exec','开盘前配置白名单','Listing Ops','Rebeca Zhang / Eyang','开盘前','在系统后台配置交易白名单，确保开盘按计划进行',true);
    add('正式上线','launch','通知 MM 正式挂单','Listing Ops','Rebeca Zhang / Freya Yu','开盘时','开盘后立即通知做市商挂单，确保盘口流动性',true);
  }

  return s;
}

function estimateTime(site, product, tokenType) {
  const nc = tokenType==='newchain';
  if (site==='HK' && product==='Orderbook') return nc?'约4–6周':'约3–4周';
  if (site==='HK' && product==='RFQ')       return nc?'约3–4周':'约1–2周';
  if (site==='HK' && product==='OTC')       return nc?'约3–4周':'约1–2周';
  if (site==='Global' && product==='RFQ')   return nc?'约2–3周':'约3–5天';
  if (site==='Global' && product==='OTC')   return nc?'约2–3周':'约2–3天';
  if (site==='Global' && product==='Orderbook') return nc?'约3–4周':'约1–2周';
  if (site==='Global' && product==='Perp') return nc?'约3–4周':'约1–2周';
  if (site==='ID') return nc?'约2–3周':'约1周';
  if (product==='ChainOnly')    return nc?'约1–2周':'约2–3天';
  if (product==='WealthToken')  return '约2–3周';
  if (product==='Maintenance')  return '按维护窗口';
  return '—';
}

// ─── Storage helpers ──────────────────────────────────────────────────────────
async function loadRecordsFromDB() {
  const { data, error } = await db.from('listing_records').select('data');
  if (error) { console.error('Load error:', error); return []; }
  return (data || []).map(row => row.data);
}
async function syncRecord(record) {
  const { error } = await db.from('listing_records')
    .upsert({ id: record.id, data: record, updated_at: new Date().toISOString() });
  if (error) console.error('Sync error:', error);
}
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function countDone(checked, naSteps) {
  return Object.values(checked||{}).filter(Boolean).length
       + Object.values(naSteps||{}).filter(Boolean).length;
}
function computeStatus(checked, total, naSteps) {
  const done = countDone(checked, naSteps);
  if (done===0) return 'not_started';
  if (done===total) return 'completed';
  return 'in_progress';
}
function getRecordStatus(r, total) {
  if (r.cancelled) return 'cancelled';
  return computeStatus(r.checked||{}, total, r.naSteps||{});
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtLaunchTime(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
}
// datetime-local input needs "YYYY-MM-DDTHH:MM"
function toInputVal(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:00`;
}

function ProgressRing({ pct, size=48, stroke=4, color='#2E75B6' }) {
  const r = (size-stroke)/2, circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={pct===100?'#059669':color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.4s'}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        style={{fill:pct===100?'#059669':'#374151', fontSize:12, fontWeight:700, transform:'rotate(90deg)', transformOrigin:`${size/2}px ${size/2}px`}}>
        {pct}%
      </text>
    </svg>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ records, onOpen, onNew, onDelete, onRestore, onUpdate, onViewCompleted, onImport, siteFilter }) {
  const [filter, setFilter] = useState('all');
  const [viewMode, setViewMode] = useState('grid'); // 'grid' | 'list' | 'table'
  const [cancelTarget, setCancelTarget] = useState(null);
  const [cancelReason, setCancelReason] = useState('');
  const [editingLaunchId, setEditingLaunchId] = useState(null);
  const [launchInputVal, setLaunchInputVal] = useState('');
  const [editingBlockerId, setEditingBlockerId] = useState(null);
  const [blockerInputVal, setBlockerInputVal] = useState('');
  const [blockerComposing, setBlockerComposing] = useState(false);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importPreview, setImportPreview] = useState(null); // {newRecords, skipCount}
  const [importFile, setImportFile] = useState(null);

  const openCancelModal = (e, id) => {
    e.stopPropagation();
    setCancelTarget(id);
    setCancelReason('');
  };
  const confirmCancel = () => {
    if (!cancelReason.trim()) return;
    onDelete(cancelTarget, cancelReason.trim());
    setCancelTarget(null);
    setCancelReason('');
  };

  const handleImportFile = (file) => {
    if (!file) return;
    setImportFile(file);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const SITE_MAP = {'OSL HK':'HK','HK':'HK','Global':'Global','OSL Global':'Global','OSL ID':'ID','OSL ID ':'ID','ID':'ID'};
        const PRODUCT_MAP = {'OTC':'OTC','Orderbook':'Orderbook','RFQ':'RFQ','仅上链':'ChainOnly','理财代币':'WealthToken'};
        const IGNORE_PRODUCTS = ['StableHub','Launchpool'];
        const newRecords = [];
        rows.forEach(row => {
          const ticker = (row['Token Ticker']||row['Token']||'').toString().trim();
          if (!ticker) return;
          const siteRaw = (row['站点']||row['Site']||'').toString().trim();
          const productRaw = (row['交易类型']||row['Product']||'').toString().trim();
          // Parse sites (may be comma-separated)
          const siteParts = siteRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const sites = siteParts.map(s=>SITE_MAP[s]).filter(Boolean);
          if (sites.length === 0) sites.push('HK'); // default
          // Parse products (may be comma-separated), filter out ignored ones
          const productParts = productRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const stableHub = productParts.some(p=>p==='StableHub');
          const launchpool = productParts.some(p=>p==='Launchpool');
          const products = productParts.filter(p=>!IGNORE_PRODUCTS.includes(p)).map(p=>PRODUCT_MAP[p]).filter(Boolean);
          if (products.length === 0) products.push('OTC'); // default
          // Parse chain labels
          const chainRaw = (row['区块链']||row['Chain']||'').toString().trim();
          const chainLabels = chainRaw ? chainRaw.split('/').map(s=>s.trim()).filter(Boolean) : [];
          // Parse quote currencies
          const quoteRaw = (row['交易对名称']||row['交易对']||'').toString().trim();
          const quoteCurrencies = quoteRaw ? quoteRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
          // Parse launch time
          let expectedLaunchTime = null;
          const ltRaw = row['预计上线时间']||row['Expected Launch Time']||'';
          if (ltRaw instanceof Date) {
            expectedLaunchTime = ltRaw.toISOString();
          } else if (typeof ltRaw === 'number' && ltRaw > 0) {
            const d = XLSX.SSF.parse_date_code(ltRaw);
            if (d) expectedLaunchTime = new Date(d.y,d.m-1,d.d,d.H||0,d.M||0).toISOString();
          } else if (typeof ltRaw === 'string' && ltRaw.trim()) {
            const parsed = new Date(ltRaw.trim());
            if (!isNaN(parsed)) expectedLaunchTime = parsed.toISOString();
          }
          const userType = (row['用户类型']||row['User Type']||'').toString().trim();
          const expectedMM = (row['做市商']||row['MM']||'').toString().trim();
          const tokenSymbol = ticker.toUpperCase();
          const tokenName = quoteCurrencies.length > 0 ? quoteCurrencies.map(q=>`${tokenSymbol}/${q}`).join(', ') : tokenSymbol;
          sites.forEach(site => {
            products.forEach(product => {
              newRecords.push({
                _key: tokenSymbol+'|'+site+'|'+product,
                id: genId(),
                tokenName, tokenSymbol, quoteCurrencies,
                chainLabels, chainOnly: product==='ChainOnly',
                chains: [], userType, expectedMM, expectedLaunchTime,
                site, product, tokenType:'subtoken',
                stableHub: site==='Global' && product==='RFQ' ? stableHub : false,
                launchpool: site==='ID' ? launchpool : false,
                blocker: '', checked: {}, naSteps: {}, stepNotes: {}, notes: '',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                estimatedTime: estimateTime(site, product, 'subtoken'),
              });
            });
          });
        });
        // Deduplicate against existing records
        const existingKeys = new Set(records.map(r=>(r.tokenSymbol||r.tokenName).toUpperCase()+'|'+r.site+'|'+r.product));
        const toImport = newRecords.filter(r=>!existingKeys.has(r._key));
        const skipCount = newRecords.length - toImport.length;
        setImportPreview({newRecords: toImport.map(r=>{const {_key,...rest}=r;return rest;}), skipCount});
      } catch(err) {
        console.error('Import error:', err);
        alert('解析文件失败：'+err.message);
      }
    };
    reader.readAsBinaryString(file);
  };

  const confirmImport = () => {
    if (!importPreview || !importPreview.newRecords.length) return;
    onImport(importPreview.newRecords);
    setShowImportModal(false);
    setImportPreview(null);
    setImportFile(null);
  };

  const filtered = records.filter(r => {
    if (siteFilter && r.site !== siteFilter) return false;
    if (filter==='all') return true;
    const checklist = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
    const status = getRecordStatus(r, checklist.length);
    return status === filter;
  });

  const STATUS_ORDER = { in_progress:0, not_started:1, completed:2, cancelled:3 };
  const sorted = [...filtered].sort((a,b) => {
    const clA = buildChecklist(a.site,a.product,a.tokenType,{stableHub:a.stableHub});
    const clB = buildChecklist(b.site,b.product,b.tokenType,{stableHub:b.stableHub});
    const sA = STATUS_ORDER[getRecordStatus(a, clA.length)] ?? 99;
    const sB = STATUS_ORDER[getRecordStatus(b, clB.length)] ?? 99;
    if (sA !== sB) return sA - sB;
    // 进行中：有预期上线时间的排前面，按时间升序（最近截止的优先）
    if (sA === 0) {
      if (a.expectedLaunchTime && b.expectedLaunchTime)
        return new Date(a.expectedLaunchTime) - new Date(b.expectedLaunchTime);
      if (a.expectedLaunchTime) return -1;
      if (b.expectedLaunchTime) return 1;
    }
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  });

  return (
    <div>
      {/* Import modal */}
      {showImportModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:480, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>📥 导入 XLSX</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>选择包含上币记录的 Excel 文件，系统将自动解析并创建任务。</div>
            <input type="file" accept=".xlsx,.xls" onChange={e=>handleImportFile(e.target.files[0])}
              style={{display:'block', marginBottom:16, fontSize:13, fontFamily:'inherit'}}/>
            {importPreview && (
              <div style={{background: importPreview.newRecords.length>0?'#F0FDF4':'#FEF3C7', border:`1px solid ${importPreview.newRecords.length>0?'#86EFAC':'#FDE68A'}`, borderRadius:10, padding:'12px 16px', marginBottom:16, fontSize:13}}>
                <div style={{fontWeight:700, color:'#111827', marginBottom:4}}>
                  将导入 <span style={{color:'#059669'}}>{importPreview.newRecords.length}</span> 条新记录，跳过 <span style={{color:'#D97706'}}>{importPreview.skipCount}</span> 条重复记录
                </div>
                {importPreview.newRecords.length > 0 && (
                  <div style={{marginTop:8, maxHeight:160, overflowY:'auto', display:'flex', flexDirection:'column', gap:4}}>
                    {importPreview.newRecords.slice(0,8).map((r,i)=>(
                      <div key={i} style={{fontSize:12, color:'#374151'}}>
                        {SITES.find(s=>s.id===r.site)?.icon} <strong>{r.tokenSymbol}</strong> · {r.site} · {r.product}
                        {r.expectedLaunchTime && <span style={{color:'#D97706', marginLeft:6}}>🗓 {fmtLaunchTime(r.expectedLaunchTime)}</span>}
                      </div>
                    ))}
                    {importPreview.newRecords.length > 8 && <div style={{fontSize:12, color:'#9CA3AF'}}>还有 {importPreview.newRecords.length-8} 条...</div>}
                  </div>
                )}
              </div>
            )}
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={()=>{setShowImportModal(false);setImportPreview(null);setImportFile(null);}} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>取消</button>
              <button onClick={confirmImport} disabled={!importPreview||!importPreview.newRecords.length} style={{border:'none', background:(importPreview&&importPreview.newRecords.length)?'#2E75B6':'#F3F4F6', color:(importPreview&&importPreview.newRecords.length)?'white':'#9CA3AF', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:(importPreview&&importPreview.newRecords.length)?'pointer':'not-allowed', fontWeight:700}}>确认导入</button>
            </div>
          </div>
        </div>
      )}
      {/* Cancel modal */}
      {cancelTarget && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:440, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>取消上币任务</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>进度数据会完整保留，可随时恢复。请填写取消原因：</div>
            <textarea
              autoFocus
              value={cancelReason}
              onChange={e=>setCancelReason(e.target.value)}
              placeholder="例如：项目方撤回申请、合规未通过、暂缓上线..."
              rows={4}
              style={{width:'100%', border:'2px solid #E5E7EB', borderRadius:10, padding:'10px 12px', fontSize:14, fontFamily:'inherit', resize:'vertical', outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#2E75B6'}
              onBlur={e=>e.target.style.borderColor='#E5E7EB'}
            />
            <div style={{display:'flex', gap:10, marginTop:16, justifyContent:'flex-end'}}>
              <button onClick={()=>setCancelTarget(null)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>返回</button>
              <button onClick={confirmCancel} disabled={!cancelReason.trim()} style={{border:'none', background: cancelReason.trim() ? '#DC2626' : '#F3F4F6', color: cancelReason.trim() ? 'white' : '#9CA3AF', borderRadius:9, padding:'9px 20px', fontSize:13, cursor: cancelReason.trim() ? 'pointer' : 'not-allowed', fontWeight:700}}>确认取消</button>
            </div>
          </div>

      {/* Header */}
      <div style={{background:C.navy, padding:'20px 24px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div>
          <div style={{color:'white', fontSize:20, fontWeight:700}}>OSL 上币流程向导</div>

              const pct = checklist.length ? Math.round(done/checklist.length*100) : 0;
              const status = getRecordStatus(r, checklist.length);
              const sm = STATUS_META[status];
              const isGrid = true;
              const isCancelled = status === 'cancelled';

              const pendingCritical = isCancelled ? [] : checklist

                          <span style={{width:14, height:14, borderRadius:3, border:'1.5px solid #FCA5A5', display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                            <span style={{fontSize:8, color:'#EF4444'}}>✕</span>
                          </span>
                          <span style={{fontSize:12, color:'#374151', fontWeight:600}}>{step.task}</span>
                          <span style={{fontSize:11, color:'#9CA3AF', flexShrink:0}}>— {step.contact.split('\n')[0]}</span>
                        </div>
                      ))}
                      {pendingCritical.length>3 && <div style={{fontSize:11, color:'#EF4444'}}>还有 {pendingCritical.length-3} 项...</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── New Listing Wizard ───────────────────────────────────────────────────────
function NewListingWizard({ onSave, onCancel, existingRecords, onOpenExisting }) {
  const [site, setSite] = useState(null);
  const [products, setProducts] = useState([]); // multi-select
  const [tokenType, setTokenType] = useState(null);
  const [tokenSymbol, setTokenSymbol] = useState('');
  const [quoteCurrencies, setQuoteCurrencies] = useState([]); // selected quote currencies
  const [chainOnly, setChainOnly] = useState(false);          // 仅上链
  const [chains, setChains] = useState([]);
  const [customChain, setCustomChain] = useState('');
  const [userType, setUserType] = useState('');
  const [expectedMM, setExpectedMM] = useState('');
  const [wizardLaunchTime, setWizardLaunchTime] = useState('');
  const [stableHub, setStableHub] = useState(null);
  const [launchpool, setLaunchpool] = useState(null);
  const [dupWarning, setDupWarning] = useState(null);

  // ── Announcement fields (ChainOnly) ──────────────────────────────────────────
  const [annTokenSymbols, setAnnTokenSymbols] = useState('');
  const [annChainName, setAnnChainName]       = useState('');
  const [annChainSuffix, setAnnChainSuffix]   = useState('');
  const [annDepositStatus, setAnnDepositStatus] = useState('Opened');
  const [annTradingPairs, setAnnTradingPairs]   = useState('');
  const [annAboutEN, setAnnAboutEN] = useState('');
  const [annAboutZH, setAnnAboutZH] = useState('');
  const [annAboutTC, setAnnAboutTC] = useState('');
  const [annWebsite, setAnnWebsite] = useState('');
  const [annWhitepaper, setAnnWhitepaper] = useState('');
  const [annTwitter, setAnnTwitter]   = useState('');
  const [annAboutLang, setAnnAboutLang] = useState('EN');

  const QUOTE_OPTIONS = ['USD','USDT','USDC','BTC','HKD','IDR'];
  const [customQuote, setCustomQuote] = useState('');
  const addCustomQuote = () => {
    const v = customQuote.trim().toUpperCase();
    if (!v || quoteCurrencies.includes(v)) { setCustomQuote(''); return; }
    setQuoteCurrencies(prev=>[...prev, v]);
    setCustomQuote('');
  };
  const toggleQuote = (q) => {
    if (chainOnly) return;
    setQuoteCurrencies(prev => prev.includes(q) ? prev.filter(x=>x!==q) : [...prev,q]);
  };
  const toggleChainOnly = () => {
    setChainOnly(v => { if (!v) setQuoteCurrencies([]); return !v; });
  };

  const toggleProduct = (id) => {
    setProducts(prev => prev.includes(id) ? prev.filter(p=>p!==id) : [...prev, id]);
    if (id==='RFQ' && products.includes('RFQ')) setStableHub(null); // deselecting RFQ clears StableHub
  };
  const needsStableHub  = site==='Global' && products.includes('RFQ');
  const needsLaunchpool = site==='ID' && products.length > 0;
  const canCreate = site && products.length > 0 && tokenType && tokenSymbol.trim()
    && (!needsStableHub  || stableHub  !== null)
    && (!needsLaunchpool || launchpool !== null);

  const toggleChain = (id) => setChains(prev => prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]);
  const addCustomChain = () => {
    const v = customChain.trim();
    if (!v) return;
    const id = 'CUSTOM_'+v.toUpperCase();
    if (!chains.includes(id)) setChains(prev=>[...prev, id]);
    setCustomChain('');
  };
  // Derive display name
  const derivedName = () => {
    const sym = tokenSymbol.trim();
    if (!sym) return '';
    if (chainOnly) return `${sym}（仅上链）`;
    if (quoteCurrencies.length > 0) return quoteCurrencies.map(q=>`${sym}/${q}`).join(', ');
    return sym;
  };

  const doCreate = () => {
    const lp = needsLaunchpool ? !!launchpool : false;
    const chainLabels = chains.map(id => {
      const c = CHAINS.find(c=>c.id===id);
      return c ? c.tag : id.replace('CUSTOM_','');
    });
    const launchIso = wizardLaunchTime ? new Date(wizardLaunchTime).toISOString() : null;
    const newRecords = products.map(prod => {
      const sh = (site==='Global' && prod==='RFQ') ? !!stableHub : false;
      return {
        id: genId(),
        tokenName: derivedName(),
        tokenSymbol: tokenSymbol.trim(),
        quoteCurrencies, chainOnly,
        chains, chainLabels,
        userType, expectedMM,
        expectedLaunchTime: launchIso,
        site, product: prod, tokenType, stableHub: sh, launchpool: lp,
        blocker: '', checked: {}, naSteps: {}, stepNotes: {}, notes: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        estimatedTime: estimateTime(site, prod, tokenType),
        annFields: prod === 'ChainOnly' ? {
          tokenSymbols: annTokenSymbols.trim() || tokenSymbol.trim(),
          chainName:    annChainName.trim(),
          chainSuffix:  annChainSuffix.trim(),
          depositStatus: annDepositStatus,
          tradingPairs: annTradingPairs.trim(),
          aboutEN: annAboutEN.trim(),
          aboutZH: annAboutZH.trim(),
          aboutTC: annAboutTC.trim(),
          website:    annWebsite.trim(),
          whitepaper: annWhitepaper.trim(),
          twitter:    annTwitter.trim(),
        } : null,
      };
    });
    onSave(newRecords);
  };

  const handleCreate = () => {
    if (!canCreate) return;
    const sym = tokenSymbol.trim().toLowerCase();
    const allMatches = [];
    products.forEach(prod => {
      const m = (existingRecords || []).filter(r =>
        (r.tokenSymbol||r.tokenName).trim().toLowerCase() === sym &&
        r.site === site && r.product === prod
      );
      allMatches.push(...m);
    });
    if (allMatches.length > 0) setDupWarning({ matches: allMatches });
    else doCreate();
  };

  const sInfo = SITES.find(s=>s.id===site);

  return (
    <div style={{height:'100%', overflowY:'auto'}}>
      {/* Duplicate warning modal */}
      {dupWarning && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:460, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
              <span style={{fontSize:22}}>⚠️</span>
              <div style={{fontWeight:800, fontSize:17, color:'#92400E'}}>疑似重复任务</div>
            </div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:16}}>
              已找到 <strong>{dupWarning.matches.length}</strong> 条相同币种 + 站点 + 产品的记录，可能是重复创建：
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:20}}>
              {dupWarning.matches.map(r => {
                const cl = buildChecklist(r.site, r.product, r.tokenType, {stableHub: r.stableHub, launchpool: r.launchpool});
                const st = getRecordStatus(r, cl.length);
                const sm = STATUS_META[st];
                const done = Object.values(r.checked||{}).filter(Boolean).length;
                return (
                  <div key={r.id} style={{background:'#FFFBEB', border:'1px solid #FDE68A', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700, fontSize:14, color:'#111827'}}>{r.tokenName}</div>
                      <div style={{fontSize:12, color:'#6B7280', marginTop:2}}>
                        {SITES.find(s=>s.id===r.site)?.icon} {r.site} · {r.product} · 创建于 {fmtDate(r.createdAt)}
                      </div>
                      <div style={{fontSize:12, marginTop:3}}>
                        <span style={{background:sm.bg, color:sm.color, padding:'1px 8px', borderRadius:99, fontWeight:700}}>{sm.label}</span>
                        <span style={{color:'#9CA3AF', marginLeft:8}}>{done}/{cl.length} 步骤已完成</span>
                      </div>
                    </div>
                    <button onClick={()=>{ setDupWarning(null); onOpenExisting(r.id); }} style={{background:'none', border:'1px solid #D1FAE5', color:'#059669', borderRadius:8, padding:'6px 12px', fontSize:12, cursor:'pointer', fontWeight:700, whiteSpace:'nowrap'}}>查看</button>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={()=>setDupWarning(null)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>返回修改</button>
              <button onClick={()=>{ setDupWarning(null); doCreate(); }} style={{border:'none', background:'#2E75B6', color:'white', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:'pointer', fontWeight:700}}>仍然创建</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:C.navy, padding:'16px 24px', display:'flex', alignItems:'center', gap:16}}>
        <button className="btn" onClick={onCancel} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>← 返回</button>
        <div style={{color:'white', fontWeight:700, fontSize:16}}>新建上币任务</div>
      </div>

      <div style={{maxWidth:700, margin:'0 auto', padding:'24px 16px'}}>
        {/* Token info — 3 sections */}
        <div style={{background:'white', borderRadius:16, padding:24, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', marginBottom:16}}>
          <div style={{fontSize:14, fontWeight:700, color:'#374151', marginBottom:16}}>币种信息</div>

          {/* 币种代号 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>
              币种代号 <span style={{color:'#DC2626'}}>*</span>
            </div>
            <input value={tokenSymbol} onChange={e=>setTokenSymbol(e.target.value)}

                  style={{border:`2px solid ${sel?'#2E75B6':'#E5E7EB'}`, borderRadius:12, padding:'14px 16px', cursor:'pointer', background:sel?'#EBF4FB':'white', textAlign:'left', position:'relative'}}>
                  {sel && <span style={{position:'absolute', top:8, right:10, fontSize:13, color:'#2E75B6', fontWeight:900}}>✓</span>}
                  <div style={{fontSize:20, marginBottom:5}}>{p.icon}</div>

  // ── Copy to clipboard ───────────────────────────────────────────────────────
  const copyLang = async (lang) => {
    const html = buildHTML(lang);
    try {
      const blob = new Blob([html], { type: 'text/html' });
      await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
    } catch(e) {
      // Fallback
      const el = document.createElement('div');
      el.innerHTML = html; el.contentEditable = 'true';
      Object.assign(el.style, { position:'fixed', top:'-9999px', left:'-9999px', opacity:'0' });
      document.body.appendChild(el);
      const range = document.createRange(); range.selectNodeContents(el);
      window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
      document.execCommand('copy');
      document.body.removeChild(el);
    }
    setCopied(lang);
    setTimeout(()=>setCopied(null), 2000);

  const TABS = [

          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',borderRadius:8,padding:'6px 14px',cursor:'pointer',fontSize:13}}>✕ 关闭</button>
        </div>

        {/* Language tabs + copy */}
        <div style={{display:'flex',alignItems:'center',borderBottom:'2px solid #E5E7EB',padding:'0 20px',flexShrink:0,background:'#FAFAFA'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              border:'none',borderBottom:`3px solid ${tab===t.id?C.blue:'transparent'}`,
              background:'transparent',padding:'12px 16px',cursor:'pointer',fontSize:13,
              fontWeight:tab===t.id?700:400,color:tab===t.id?C.blue:'#6B7280',
            }}>{t.label}</button>
          ))}
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            <button onClick={()=>copyLang(tab)} style={{
              background: copied===tab?'#059669':C.blue,
              color:'white',border:'none',borderRadius:8,padding:'7px 18px',fontSize:13,
              fontWeight:700,cursor:'pointer',transition:'background 0.2s',
            }}>{copied===tab?'✓ 已复制！':'📋 一键复制'}</button>
            <button onClick={()=>{ TABS.forEach(t=>copyLang(t.id)); }} style={{
              background:'white',color:'#374151',border:'1.5px solid #D1D5DB',borderRadius:8,
              padding:'7px 14px',fontSize:12,cursor:'pointer',fontWeight:600,
            }}>复制全部三语</button>
          </div>
        </div>

        {/* Preview */}
        <div style={{flex:1,overflowY:'auto',padding:24}}>
          <div
            style={{fontFamily:'Arial,sans-serif',fontSize:'11pt',lineHeight:1.7,color:'#111'}}
            dangerouslySetInnerHTML={{__html: buildHTML(tab)}}
          />
        </div>
      </div>
    </div>
  );
}

// ─── Checklist View ────────────────────────────────────────────────────────────
function ChecklistView({ record, onBack, onUpdate, addToast }) {
  const checklist = useMemo(()=>buildChecklist(record.site, record.product, record.tokenType, {stableHub: record.stableHub, launchpool: record.launchpool}),[record]);
  const [expandedSteps, setExpandedSteps] = useState({});
  const [editNote, setEditNote] = useState(false);
  const [noteText, setNoteText] = useState(record.notes||'');
  const [showCancelModal, setShowCancelModal] = useState(false);
  const [showAnn, setShowAnn] = useState(false);
  const [cancelReason, setCancelReason] = useState('');
  const [showEditModal, setShowEditModal] = useState(false);
  const [editTokenName, setEditTokenName] = useState(record.tokenName||'');
  const [editExpectedMM, setEditExpectedMM] = useState(record.expectedMM||'');
  const [editUserType, setEditUserType] = useState(record.userType||'');
  const [editBlocker, setEditBlocker] = useState(record.blocker||'');
  const [editLaunchTime, setEditLaunchTime] = useState(toInputVal(record.expectedLaunchTime));

  const checked = record.checked || {};
  const total = checklist.length;
  const isCancelled = !!record.cancelled;
  // done = checked + NA (both count toward progress)
  const done = countDone(checked, record.naSteps||{});
  const pct = total ? Math.round(done/total*100) : 0;
  const isComplete = !isCancelled && done===total && total>0;

  const handleCancelConfirm = () => {
    if (!cancelReason.trim()) return;
    onUpdate({...record, cancelled: true, cancelReason: cancelReason.trim(), updatedAt: new Date().toISOString()});
    setShowCancelModal(false);
    setCancelReason('');
  };
  const handleRestore = () => {
    onUpdate({...record, cancelled: false, cancelReason: '', updatedAt: new Date().toISOString()});
  };

  const naSteps   = record.naSteps   || {};
  const stepNotes = record.stepNotes || {};
  const [editingStepNote, setEditingStepNote] = useState(null);
  const [stepNoteVal, setStepNoteVal] = useState('');

  const toggle = (idx) => {
    const nowDone = !checked[idx];
    const newChecked = {...checked, [idx]: nowDone};
    const newNA = nowDone ? {...naSteps, [idx]:false} : naSteps;
    const step = checklist[idx];
    const newTotal = countDone(newChecked, newNA);
    let msg = nowDone ? ('✅ ' + step.task.slice(0,28)) : ('↩ 撤销：' + step.task.slice(0,24));
    if (nowDone && newTotal===checklist.length) msg = '🎉 ' + record.tokenName + ' 全部完成！';
    onUpdate({...record, checked:newChecked, naSteps:newNA, updatedAt:new Date().toISOString()}, msg);
  };

  const toggleNA = (idx) => {
    const nowNA = !naSteps[idx];
    const newNA = {...naSteps, [idx]: nowNA};
    const newChecked = nowNA ? {...checked, [idx]:false} : checked;
    onUpdate({...record, naSteps:newNA, checked:newChecked, updatedAt:new Date().toISOString()},
      nowNA ? ('— N/A：' + (checklist[idx]?.task||'').slice(0,20)) : '');
  };

  const saveStepNote = (idx) => {
    const newNotes = {...stepNotes, [idx]: stepNoteVal.trim()};
    onUpdate({...record, stepNotes:newNotes, updatedAt:new Date().toISOString()}, '📝 步骤备注已保存');
    setEditingStepNote(null);
  };

  const stepFields = record.stepFields || {};
  const setStepField = (inputKey, value, stepIdx) => {
    const newFields = {...stepFields, [inputKey]: value};
    const newChecked = {...checked, [stepIdx]: !!value};
    onUpdate({...record, stepFields:newFields, checked:newChecked, updatedAt:new Date().toISOString()}, value?`✅ ${inputKey} 已填写`:'');
  };

  const openEditModal = () => {
    setEditTokenName(record.tokenName||'');
    setEditExpectedMM(record.expectedMM||'');
    setEditUserType(record.userType||'');
    setEditBlocker(record.blocker||'');
    setEditLaunchTime(toInputVal(record.expectedLaunchTime));
    setShowEditModal(true);
  };
  const saveEditModal = () => {
    const iso = editLaunchTime ? new Date(editLaunchTime).toISOString() : null;
    onUpdate({...record, tokenName:editTokenName, expectedMM:editExpectedMM, userType:editUserType, blocker:editBlocker, expectedLaunchTime:iso, updatedAt:new Date().toISOString()}, '✏ 记录信息已更新');
    setShowEditModal(false);
  };

  const saveNote = () => {
    onUpdate({...record, notes:noteText, updatedAt:new Date().toISOString()}, `📝 备注已更新：${record.tokenName}`);
    setEditNote(false);
  };

  // Group by phase
  const phases = [];
  let cur = null;
  checklist.forEach((step,i)=>{
    if (!cur || cur.name!==step.phase) { cur={name:step.phase,tag:step.tag,steps:[]}; phases.push(cur); }
    cur.steps.push({...step,idx:i});
  });

  const siteInfo = SITES.find(s=>s.id===record.site);
  const prodInfo = PRODUCTS.find(p=>p.id===record.product);

  return (
    <div>
      {/* Announcement overlay */}
      {showAnn && record.annFields && (
        <AnnouncementView record={record} onClose={()=>setShowAnn(false)}/>
      )}
      {/* Edit info modal */}
      {showEditModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:460, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:16}}>✏ 编辑记录信息</div>
            <div style={{display:'flex', flexDirection:'column', gap:14}}>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>任务名称</div>
                <input value={editTokenName} onChange={e=>setEditTokenName(e.target.value)}
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>做市商（MM）</div>
                <input value={editExpectedMM} onChange={e=>setEditExpectedMM(e.target.value)}
                  placeholder="例如：Wintermute、GSR..."
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>用户类型</div>
                <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                  {['PI（专业投资者）','零售 Retail','两者','不适用'].map(opt=>(
                    <button key={opt} onClick={()=>setEditUserType(editUserType===opt?'':opt)} style={{
                      border:`1.5px solid ${editUserType===opt?C.navy:'#E5E7EB'}`,
                      borderRadius:8, padding:'6px 12px', cursor:'pointer',
                      background: editUserType===opt?'#D6E4F0':'white',
                      fontSize:12, fontWeight: editUserType===opt?700:400,
                      color: editUserType===opt?C.navy:'#374151',
                    }}>{opt}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>当前卡点</div>
                <textarea value={editBlocker} onChange={e=>setEditBlocker(e.target.value)}
                  placeholder="例如：等待合规尽调、LP未确认…（支持中文，可拖右下角调整大小）"
                  rows={3}
                  style={{width:'100%', border:'1.5px solid #E5E7EB', borderRadius:9, padding:'9px 12px', fontSize:14, fontFamily:'inherit', outline:'none', resize:'vertical', lineHeight:1.6}}/>

                <div style={{fontSize:13, fontWeight:600, color:'#374151', marginBottom:5}}>期望上线时间</div>

              </div>
            </div>
            <div style={{fontSize:12, color:'#9CA3AF', marginTop:12, marginBottom:4}}>注：站点、产品、代币类型不可编辑（影响清单结构）</div>
            <div style={{display:'flex', gap:10, marginTop:12, justifyContent:'flex-end'}}>
              <button onClick={()=>setShowEditModal(false)} style={{border:'1px solid #E5E7EB', background:'white', borderRadius:9, padding:'9px 18px', fontSize:13, cursor:'pointer', color:'#6B7280', fontWeight:600}}>取消</button>
              <button onClick={saveEditModal} style={{border:'none', background:'#2E75B6', color:'white', borderRadius:9, padding:'9px 20px', fontSize:13, cursor:'pointer', fontWeight:700}}>保存</button>
            </div>
          </div>
        </div>
      )}
      {/* Cancel reason modal */}
      {showCancelModal && (

          <div style={{background:'white', borderRadius:16, padding:28, width:'100%', maxWidth:440, boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}}>
            <div style={{fontWeight:800, fontSize:17, color:'#111827', marginBottom:6}}>取消上币任务</div>
            <div style={{fontSize:13, color:'#6B7280', marginBottom:18}}>进度数据会完整保留，可随时恢复。请说明取消原因：</div>

              {isCancelled ? '🚫 已取消' : isComplete ? '🎉 全部完成！' : `${done} / ${total} 步骤完成`}
            </div>
            <div style={{background:'#E5E7EB', borderRadius:99, height:7, marginTop:8, overflow:'hidden'}}>
              <div style={{width:`${pct}%`, height:'100%', background:isComplete?'#059669':'#2E75B6', borderRadius:99, transition:'width 0.3s'}}/>
            </div>
          </div>
          <div style={{fontSize:12, color:'#9CA3AF', textAlign:'right'}}>
            <div>创建：{fmtDate(record.createdAt)}</div>
            <div>更新：{fmtDate(record.updatedAt)}</div>
          </div>
        </div>

        {/* Cancelled banner */}
        {isCancelled && record.cancelReason && (
          <div style={{background:'#FEF2F2', border:'1px solid #FECACA', borderRadius:12, padding:'12px 16px', marginBottom:14, display:'flex', gap:10, alignItems:'flex-start'}}>

              <div style={{fontSize:12, fontWeight:700, color:'#B91C1C', marginBottom:2}}>取消原因</div>
              <div style={{fontSize:13, color:'#374151'}}>{record.cancelReason}</div>

        <div style={{background:'white', borderRadius:14, padding:'14px 18px', marginBottom:14, boxShadow:'0 1px 6px rgba(0,0,0,0.05)', border:'1px solid #E5E7EB'}} className="no-print">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: editNote?10:0}}>
            <span style={{fontSize:13, fontWeight:700, color:'#374151'}}>📝 任务备注</span>
            {!editNote ? (
              <button onClick={()=>setEditNote(true)} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:7, padding:'4px 10px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>编辑</button>
            ) : (
              <div style={{display:'flex', gap:6}}>
                <button onClick={()=>{setEditNote(false);setNoteText(record.notes||'');}} style={{background:'none', border:'1px solid #E5E7EB', borderRadius:7, padding:'4px 10px', fontSize:12, cursor:'pointer', color:'#6B7280'}}>取消</button>

          ) : (
            noteText ? <div style={{fontSize:13, color:'#4B5563', marginTop:6, lineHeight:1.6}}>{noteText}</div>
                     : <div style={{fontSize:12, color:'#D1D5DB', marginTop:2}}>点击编辑添加备注...</div>
          )}
        </div>

        {/* Phase groups */}
        {phases.map((phase,pi)=>{
          const pc = PHASE_COLORS[phase.tag]||PHASE_COLORS.exec;

            <div key={pi} style={{marginBottom:12}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6, padding:'0 4px'}}>

              {phase.steps.map(step=>{
                const isDone = !!checked[step.idx];
                const isNA   = !isDone && !!(naSteps[step.idx]);
                const isExp  = !!expandedSteps[step.idx];
                const hasNote = step.note && step.note.trim();
                const myNote  = stepNotes[step.idx] || '';
                const isEditingNote = editingStepNote === step.idx;
                const bg = isDone ? '#F0FDF4' : isNA ? '#F9FAFB' : 'white';
                const borderColor = isDone ? '#86EFAC' : isNA ? '#E5E7EB' : step.critical ? '#FCA5A5' : '#E5E7EB';
                const leftColor   = isDone ? '#22C55E' : isNA ? '#D1D5DB' : step.critical ? '#EF4444' : pc.border;

                      <div onClick={()=>toggle(step.idx)} style={{width:22,height:22,borderRadius:6,
                        border:'2px solid '+(isDone?'#22C55E':'#D1D5DB'),
                        background:isDone?'#22C55E':'white', display:'flex',alignItems:'center',justifyContent:'center',
                        flexShrink:0, marginTop:2, cursor:'pointer', transition:'all 0.15s'}}>
                        {isDone && <span style={{color:'white',fontSize:13,fontWeight:900}}>✓</span>}
                      </div>
                      {/* Step info */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                          <span style={{fontWeight:700,fontSize:14,
                            color: isDone?'#6B7280': isNA?'#9CA3AF':'#111827',
                            textDecoration: isDone||isNA?'line-through':'none'}}>
                            {step.idx+1}. {step.task}
                          </span>
                          {isNA && <span style={{background:'#F3F4F6',color:'#9CA3AF',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:99}}>不需要</span>}
                          {step.critical && !isDone && !isNA && <span style={{background:'#FEE2E2',color:'#DC2626',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:99}}>关键</span>}
                        </div>
                        {/* Text input for inputType=text */}
                        {step.inputType==='text' && !isNA && (
                          <div style={{marginTop:6}}>
                            <input value={stepFields[step.inputKey]||''}
                              onChange={e=>setStepField(step.inputKey,e.target.value,step.idx)}
                              onClick={e=>e.stopPropagation()}
                              placeholder={`输入${step.task}…`}
                              style={{width:'100%',fontSize:13,border:'1.5px solid '+(stepFields[step.inputKey]?'#86EFAC':'#E5E7EB'),
                                borderRadius:8,padding:'7px 10px',outline:'none',fontFamily:'inherit',
                                background:stepFields[step.inputKey]?'#F0FDF4':'white',boxSizing:'border-box'}}/>
                          </div>
                        )}
                        {/* Select for inputType=select */}
                        {step.inputType==='select' && !isNA && (
                          <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                            {(step.inputOptions||[]).map(opt=>{
                              const sel = stepFields[step.inputKey]===opt;
                              return (
                                <button key={opt} onClick={e=>{e.stopPropagation();setStepField(step.inputKey,sel?'':opt,step.idx);}}
                                  style={{fontSize:12,padding:'4px 12px',borderRadius:6,cursor:'pointer',
                                    background:sel?'#1B3A6B':'white',color:sel?'white':'#374151',
                                    border:`1.5px solid ${sel?'#1B3A6B':'#E5E7EB'}`,fontWeight:sel?700:400}}>
                                  {opt}
                                </button>
                              );
                            })}
                          </div>
                        )}
                        {!step.inputType && <div style={{display:'flex',gap:12,marginTop:4,flexWrap:'wrap'}}>
                          <span style={{fontSize:12,color:'#4B5563'}}>👤 {step.owner}</span>
                          <span style={{fontSize:12,color:'#2E75B6',fontWeight:600}}>📞 {step.contact}</span>
                          <span style={{fontSize:12,color:'#6B7280'}}>⏱ {step.time}</span>
                        </div>}
                        {/* Per-step note display */}
                        {myNote && !isEditingNote && (
                          <div style={{marginTop:6, background:'#FFFBEB', border:'1px solid #FDE68A', borderRadius:6,
                            padding:'5px 10px', fontSize:12, color:'#92400E', display:'flex', gap:6, alignItems:'flex-start'}}>
                            <span>📌</span><span style={{flex:1}}>{myNote}</span>
                          </div>
                        )}
                        {/* Note editor */}
                        {isEditingNote && (
                          <div style={{marginTop:6}}>
                            <textarea autoFocus value={stepNoteVal} onChange={e=>setStepNoteVal(e.target.value)}
                              placeholder="填写备注信息，如负责人确认结果、截图说明等..."
                              rows={2} style={{width:'100%',fontSize:12,border:'1.5px solid #2E75B6',borderRadius:6,
                                padding:'6px 8px',fontFamily:'inherit',resize:'vertical',outline:'none',boxSizing:'border-box'}}/>
                            <div style={{display:'flex',gap:6,marginTop:4}}>
                              <button onClick={()=>saveStepNote(step.idx)} style={{background:C.blue,color:'white',border:'none',borderRadius:6,padding:'4px 12px',fontSize:12,cursor:'pointer',fontWeight:600}}>保存</button>
                              <button onClick={()=>setEditingStepNote(null)} style={{background:'none',border:'1px solid #E5E7EB',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'#6B7280'}}>取消</button>
                              {myNote && <button onClick={()=>{setStepNoteVal('');saveStepNote(step.idx);}} style={{background:'none',border:'1px solid #FCA5A5',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'#EF4444'}}>清除</button>}
                            </div>
                          </div>
                        )}
                      </div>
                      {/* Action buttons: N/A + Note + Expand */}
                      <div style={{display:'flex',gap:4,flexShrink:0,alignItems:'center',marginTop:2}}>
                        <button onClick={e=>{e.stopPropagation();toggleNA(step.idx);}}
                          title="标记为不需要"
                          style={{fontSize:11,fontWeight:600,padding:'3px 7px',borderRadius:5,cursor:'pointer',
                            background:isNA?'#F3F4F6':'none', color:isNA?'#6B7280':'#D1D5DB',
                            border:'1px solid '+(isNA?'#D1D5DB':'#E5E7EB'),
                            transition:'all 0.15s'}}>N/A</button>
                        <button onClick={e=>{e.stopPropagation();setEditingStepNote(isEditingNote?null:step.idx);setStepNoteVal(myNote);}}
                          title="添加备注信息"
                          style={{fontSize:12,padding:'3px 6px',borderRadius:5,cursor:'pointer',
                            background:myNote?'#FFFBEB':'none', color:myNote?'#D97706':'#D1D5DB',
                            border:'1px solid '+(myNote?'#FDE68A':'#E5E7EB')}}>📝</button>
                        {hasNote && (
                          <button onClick={e=>{e.stopPropagation();setExpandedSteps(p=>({...p,[step.idx]:!p[step.idx]}));}}
                            style={{background:'none',border:'1px solid #E5E7EB',cursor:'pointer',fontSize:13,color:'#9CA3AF',padding:'3px 5px',borderRadius:5}}>
                            {isExp?'▲':'▼'}
                          </button>
                        )}
                      </div>
                    </div>
                    {hasNote && isExp && (
                      <div style={{background:'#F8FAFC',borderTop:'1px solid #E5E7EB',padding:'10px 14px 10px 48px'}}>
                        {step.note.split('\n').map((l,i)=>(
                          <div key={i} style={{fontSize:12,color:'#4B5563',lineHeight:1.6}}>{l}</div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Completed Table ──────────────────────────────────────────────────────────
function CompletedTable({ records, onBack }) {
  const [copied, setCopied] = useState(false);

  const completed = records.filter(r => getRecordStatus(r, buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool}).length) === 'completed');

  const COLS = ['Token','区块链','交易对','站点','交易类型','用户类型','上线时间'];
  const toRow = r => [
    r.tokenSymbol || r.tokenName,
    (r.chainLabels||[]).join(' / ') || '—',
    r.chainOnly ? '仅上链' : (r.quoteCurrencies||[]).length>0 ? (r.quoteCurrencies).map(q=>`${r.tokenSymbol||r.tokenName}/${q}`).join(', ') : r.tokenName,
    r.site,
    r.product + (r.stableHub?' +SH':''),
    r.userType || '—',
    r.expectedLaunchTime ? fmtLaunchTime(r.expectedLaunchTime) : fmtDate(r.updatedAt),
  ];

  const exportExcel = () => {
    const ws = XLSX.utils.aoa_to_sheet([COLS, ...completed.map(toRow)]);
    // Column widths
    ws['!cols'] = [16,20,30,10,14,16,16].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '已完成上币');
    XLSX.writeFile(wb, `OSL已完成上币_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const copyTSV = () => {
    const lines = [COLS, ...completed.map(toRow)].map(r=>r.join('\t')).join('\n');
    navigator.clipboard.writeText(lines).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false), 2000);
    });
  };

  return (
    <div>
      <div style={{background:C.navy, padding:'16px 24px', display:'flex', alignItems:'center', gap:16}}>
        <button className="btn" onClick={onBack} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 14px', cursor:'pointer', fontSize:13}}>← 返回</button>
        <div style={{color:'white', fontWeight:700, fontSize:16}}>已完成上币记录</div>
        <div style={{marginLeft:'auto', display:'flex', gap:8}}>
          <button onClick={copyTSV} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', borderRadius:8, padding:'7px 16px', cursor:'pointer', fontSize:13, fontWeight:600}}>
            {copied ? '✓ 已复制' : '📋 一键复制'}
          </button>
          <button onClick={exportExcel} style={{background:'#059669', border:'none', color:'white', borderRadius:8, padding:'7px 16px', cursor:'pointer', fontSize:13, fontWeight:700}}>
            ⬇ 导出 Excel
          </button>
        </div>
      </div>
      <div style={{maxWidth:1000, margin:'0 auto', padding:'20px 16px'}}>
        {completed.length === 0 ? (
          <div style={{textAlign:'center', padding:'60px 0', color:'#9CA3AF'}}>
            <div style={{fontSize:40, marginBottom:12}}>🎉</div>
            <div style={{fontSize:15, fontWeight:600}}>暂无已完成的上币任务</div>
          </div>
        ) : (
          <div style={{background:'white', borderRadius:14, overflow:'hidden', boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
              <thead>
                <tr style={{background:'#F8FAFC'}}>
                  {COLS.map(col=>(
                    <th key={col} style={{padding:'10px 14px', textAlign:'left', fontWeight:700, color:'#374151', borderBottom:'2px solid #E5E7EB', whiteSpace:'nowrap'}}>{col}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {completed.map((r,i)=>{
                  const row = toRow(r);
                  const siteInfo = SITES.find(s=>s.id===r.site);
                  return (
                    <tr key={r.id} style={{background: i%2===0?'white':'#F9FAFB', borderBottom:'1px solid #F3F4F6'}}>
                      <td style={{padding:'10px 14px', fontWeight:700, color:'#111827'}}>{row[0]}</td>
                      <td style={{padding:'10px 14px', color:'#0369A1'}}>{row[1]}</td>
                      <td style={{padding:'10px 14px', color:'#374151'}}>{row[2]}</td>
                      <td style={{padding:'10px 14px'}}>
                        <span style={{background:siteInfo?.bg, color:siteInfo?.color, fontWeight:700, fontSize:11, padding:'2px 8px', borderRadius:99}}>{siteInfo?.icon} {r.site}</span>
                      </td>
                      <td style={{padding:'10px 14px', color:'#374151'}}>{row[4]}</td>
                      <td style={{padding:'10px 14px', color:'#6B7280'}}>{row[5]}</td>
                      <td style={{padding:'10px 14px', color:'#D97706', fontWeight:600}}>{row[6]}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{padding:'10px 16px', background:'#F8FAFC', borderTop:'1px solid #E5E7EB', fontSize:12, color:'#9CA3AF'}}>
              共 {completed.length} 条记录
            </div>

        )}
      </div>
    </div>
  );
}

// ─── Working days helper ──────────────────────────────────────────────────────
function workingDaysUntil(isoDate) {
  if (!isoDate) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(isoDate); target.setHours(0,0,0,0);
  if (target <= today) return -1;
  let count = 0; const cur = new Date(today);
  while (cur < target) {
    cur.setDate(cur.getDate()+1);
    const d = cur.getDay();
    if (d!==0 && d!==6) count++;
  }
  return count;
}

// ─── Detail Panel ─────────────────────────────────────────────────────────────
function DetailPanel({ record, onClose, onUpdate, onOpenFull, onCopy, scrollToPhase }) {
  const checklist = useMemo(()=>buildChecklist(record.site,record.product,record.tokenType,{stableHub:record.stableHub,launchpool:record.launchpool}),[record]);
  const [collapsedPhases, setCollapsedPhases] = useState({});
  const [editingStepNote, setEditingStepNote] = useState(null);
  const [stepNoteVal, setStepNoteVal] = useState('');
  const [showCopyMenu, setShowCopyMenu] = useState(false);
  const phaseRefs = React.useRef({});

  // Scroll to phase when triggered from table
  useEffect(()=>{
    if (!scrollToPhase) return;
    setCollapsedPhases(prev=>({...prev,[scrollToPhase]:false}));
    setTimeout(()=>{
      const el = phaseRefs.current[scrollToPhase];
      if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
    }, 80);
  },[scrollToPhase]);

  const checked   = record.checked   || {};
  const naSteps   = record.naSteps   || {};
  const stepNotes = record.stepNotes || {};
  const total = checklist.length;
  const done  = countDone(checked, naSteps);
  const pct   = total ? Math.round(done/total*100) : 0;
  const isCancelled = !!record.cancelled;

  const toggle = (idx) => {
    const nowDone = !checked[idx];
    const newChecked = {...checked, [idx]: nowDone};
    const newNA = nowDone ? {...naSteps, [idx]:false} : naSteps;
    onUpdate({...record, checked:newChecked, naSteps:newNA, updatedAt:new Date().toISOString()});
  };
  const toggleNA = (idx) => {
    const nowNA = !naSteps[idx];
    const newNA = {...naSteps, [idx]: nowNA};
    const newChecked = nowNA ? {...checked, [idx]:false} : checked;
    onUpdate({...record, naSteps:newNA, checked:newChecked, updatedAt:new Date().toISOString()});
  };
  const saveStepNote = (idx) => {
    onUpdate({...record, stepNotes:{...stepNotes,[idx]:stepNoteVal.trim()}, updatedAt:new Date().toISOString()});
    setEditingStepNote(null);
  };
  const stepFields = record.stepFields || {};
  const setStepField = (inputKey, value, stepIdx) => {
    const newFields = {...stepFields, [inputKey]: value};
    const newChecked = {...checked, [stepIdx]: !!value};
    onUpdate({...record, stepFields:newFields, checked:newChecked, updatedAt:new Date().toISOString()});
  };

  // Group by phase
  const phases = [];
  let curPh = null;
  checklist.forEach((step,i)=>{
    if (!curPh || curPh.name!==step.phase) { curPh={name:step.phase,tag:step.tag,steps:[]}; phases.push(curPh); }
    curPh.steps.push({...step,idx:i});
  });

  const SSITE = {HK:{bg:'#D6E4F0',color:'#1B3A6B'},Global:{bg:'#D4EFEC',color:'#1A7A6E'},ID:{bg:'#EAD9F7',color:'#6A3D8F'},SG:{bg:'#DCFCE7',color:'#166534'}};
  const ss = SSITE[record.site]||{bg:'#F3F4F6',color:'#374151'};
  const siteInfo = SITES.find(s=>s.id===record.site);

  return (
    <div style={{width:400,flexShrink:0,borderLeft:'2px solid #E5E7EB',display:'flex',flexDirection:'column',background:'white',overflow:'hidden'}}>
      <style>{`@keyframes slideInPanel{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}.panel-step:hover{background:#F8FAFC!important}`}</style>

      {/* Header */}
      <div style={{padding:'12px 14px 10px',borderBottom:'1px solid #E5E7EB',flexShrink:0,background:ss.bg}}>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:5}}>
          <div style={{flex:1,fontWeight:800,fontSize:15,color:ss.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
            title={record.tokenName}>{record.tokenName}</div>
          {/* Copy button + menu */}
          {onCopy && (
            <div style={{position:'relative'}}>
              <button onClick={()=>setShowCopyMenu(v=>!v)} title="复制到其他站点"

                📋
              </button>
              {showCopyMenu && (
                <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,zIndex:300,background:'white',
                  border:'1px solid #E5E7EB',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,0.14)',minWidth:170}}
                  onClick={e=>e.stopPropagation()}>
                  <div style={{padding:'8px 12px 5px',fontSize:11,color:'#9CA3AF',fontWeight:700}}>复制到站点</div>
                  {SITES.filter(s=>s.id!==record.site).map(s=>(
                    <div key={s.id} onClick={()=>{onCopy(record,s.id);setShowCopyMenu(false);}}
                      style={{padding:'8px 14px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:8,color:'#374151'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                      onMouseLeave={e=>e.currentTarget.style.background='white'}>
                      <span>{s.icon}</span><span>{s.label}</span>
                    </div>
                  ))}
                  <div onClick={()=>{onCopy(record,record.site);setShowCopyMenu(false);}}
                    style={{padding:'8px 14px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                      color:'#374151',borderTop:'1px solid #F3F4F6'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                    onMouseLeave={e=>e.currentTarget.style.background='white'}>
                    <span>📋</span><span>复制到同站点</span>
                  </div>
                </div>
              )}
            </div>
          )}
          <button onClick={()=>onOpenFull(record.id)} title="打开完整视图"
            style={{background:'rgba(0,0,0,0.08)',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',fontSize:11,color:ss.color,fontWeight:700,whiteSpace:'nowrap'}}>
            ↗ 完整
          </button>
          <button onClick={onClose}
            style={{background:'rgba(0,0,0,0.08)',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',fontSize:14,color:ss.color,fontWeight:800,lineHeight:1}}>
            ✕
          </button>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{background:'rgba(255,255,255,0.6)',color:ss.color,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99}}>
            {siteInfo?.icon} {record.site}
          </span>
          <span style={{background:'rgba(255,255,255,0.5)',color:'#374151',fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:99}}>
            {record.product}{record.stableHub?' +SH':''}{record.launchpool?' +LP':''}
          </span>
          {isCancelled && <span style={{background:'rgba(0,0,0,0.1)',color:'#6B7280',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99}}>已取消</span>}
        </div>
      </div>

      {/* Progress */}
      <div style={{padding:'9px 14px',borderBottom:'1px solid #F0F0F0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <div style={{flex:1,background:'#E5E7EB',borderRadius:99,height:6,overflow:'hidden'}}>
            <div style={{width:`${pct}%`,height:'100%',background:pct===100?'#059669':C.blue,borderRadius:99,transition:'width 0.3s'}}/>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:pct===100?'#059669':C.navy,whiteSpace:'nowrap'}}>{done}/{total}</span>
          <span style={{fontSize:11,color:'#9CA3AF'}}>{pct}%</span>
        </div>
        {record.blocker && (
          <div style={{background:'#FEF3C7',borderRadius:5,padding:'4px 9px',fontSize:11,color:'#92400E'}}>🚧 {record.blocker}</div>
        )}
      </div>

      {/* Phase steps - scrollable */}
      <div style={{flex:1,overflowY:'auto',padding:'4px 0',animation:'slideInPanel 0.18s ease'}}>
        {phases.map(ph=>{
          const phDone = ph.steps.filter(s=>checked[s.idx]||naSteps[s.idx]).length;
          const phColor = PHASE_COLORS[ph.tag]||{border:'#9CA3AF',bg:'#F9FAFB',label:ph.name};
          const isCollapsed = !!collapsedPhases[ph.tag];
          return (
            <div key={ph.name} ref={el=>phaseRefs.current[ph.tag]=el}>
              {/* Phase header */}
              <div onClick={()=>setCollapsedPhases(prev=>({...prev,[ph.tag]:!prev[ph.tag]}))}
                style={{display:'flex',alignItems:'center',gap:8,padding:'6px 14px',cursor:'pointer',
                  background:phColor.bg,borderLeft:`3px solid ${phColor.border}`,userSelect:'none'}}>
                <span style={{fontSize:11,fontWeight:700,color:phColor.border,flex:1}}>{ph.name}</span>
                <span style={{fontSize:11,color:phDone===ph.steps.length&&ph.steps.length>0?'#059669':phColor.border,fontWeight:600}}>{phDone}/{ph.steps.length}</span>
                <span style={{fontSize:9,color:phColor.border,opacity:0.7}}>{isCollapsed?'▶':'▼'}</span>
              </div>
              {/* Steps */}
              {!isCollapsed && ph.steps.map(step=>{
                const isDone  = !!checked[step.idx];
                const isNA    = !!naSteps[step.idx];
                const hasNote = !!stepNotes[step.idx];
                const isEditN = editingStepNote===step.idx;
                const fieldVal = step.inputKey ? (stepFields[step.inputKey]||'') : '';
                return (
                  <div key={step.idx} className="panel-step"
                    style={{borderBottom:'1px solid #F9FAFB',background:isDone?'#F0FDF4':isNA?'#FAFAFA':'white',opacity:isCancelled?0.6:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,padding:'7px 14px'}}>
                      {/* Done checkbox */}
                      <div onClick={()=>!isCancelled&&toggle(step.idx)}
                        style={{width:17,height:17,borderRadius:4,flexShrink:0,cursor:isCancelled?'default':'pointer',
                          border:isDone?'none':'1.5px solid #D1D5DB',background:isDone?'#059669':'white',
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {isDone && <span style={{color:'white',fontSize:10,lineHeight:1}}>✓</span>}
                      </div>
                      {/* Task */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:isDone?'#6B7280':isNA?'#9CA3AF':'#111827',
                          textDecoration:isNA?'line-through':'none',
                          fontWeight:step.critical&&!isDone&&!isNA?600:400,
                          lineHeight:'1.35', marginBottom: step.inputType?3:0}}
                          title={step.task}>
                          {step.critical&&!isDone&&!isNA&&<span style={{color:'#DC2626',marginRight:3}}>*</span>}
                          {step.task}
                        </div>
                        {/* Text input field */}
                        {step.inputType==='text' && !isNA && (
                          <input value={fieldVal}
                            onChange={e=>!isCancelled&&setStepField(step.inputKey,e.target.value,step.idx)}
                            onClick={e=>e.stopPropagation()}
                            placeholder={`输入${step.task}…`}
                            style={{width:'100%',fontSize:11,border:'1px solid '+(fieldVal?'#86EFAC':'#E5E7EB'),
                              borderRadius:5,padding:'3px 8px',outline:'none',fontFamily:'inherit',
                              boxSizing:'border-box',background:fieldVal?'#F0FDF4':'white',color:'#111827'}}/>
                        )}
                        {/* Select field */}
                        {step.inputType==='select' && !isNA && (
                          <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:2}}>
                            {(step.inputOptions||[]).map(opt=>(
                              <button key={opt} onClick={e=>{e.stopPropagation();!isCancelled&&setStepField(step.inputKey,fieldVal===opt?'':opt,step.idx);}}
                                style={{fontSize:10,padding:'2px 8px',borderRadius:4,cursor:isCancelled?'default':'pointer',
                                  background:fieldVal===opt?'#1B3A6B':step.inputType?'#F3F4F6':'#F3F4F6',
                                  color:fieldVal===opt?'white':'#374151',
                                  border:fieldVal===opt?'none':'1px solid #E5E7EB',
                                  fontWeight:fieldVal===opt?700:400}}>{opt}</button>
                            ))}
                          </div>
                        )}
                        {step.owner&&!step.inputType&&<div style={{fontSize:10,color:'#9CA3AF',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.owner}</div>}
                      </div>
                      {/* N/A */}
                      <button onClick={e=>{e.stopPropagation();!isCancelled&&toggleNA(step.idx);}}
                        style={{background:isNA?'#E5E7EB':'transparent',border:isNA?'none':'1px solid #E5E7EB',
                          borderRadius:4,padding:'2px 5px',fontSize:10,cursor:isCancelled?'default':'pointer',
                          color:isNA?'#374151':'#9CA3AF',fontWeight:isNA?700:400,flexShrink:0}}>
                        N/A
                      </button>
                      {/* Note */}
                      <button onClick={e=>{e.stopPropagation();setEditingStepNote(isEditN?null:step.idx);setStepNoteVal(stepNotes[step.idx]||'');}}
                        style={{background:hasNote?'#FEF3C7':'transparent',border:hasNote?'1px solid #FDE68A':'1px solid #E5E7EB',
                          borderRadius:4,padding:'2px 5px',fontSize:10,cursor:'pointer',
                          color:hasNote?'#92400E':'#9CA3AF',flexShrink:0}}>
                        📝
                      </button>
                    </div>
                    {/* Note editor */}
                    {isEditN && (
                      <div style={{padding:'4px 14px 8px 38px',background:'#FFFBEB'}}>
                        <input autoFocus value={stepNoteVal} onChange={e=>setStepNoteVal(e.target.value)}
                          onKeyDown={e=>{if(e.key==='Enter')saveStepNote(step.idx);if(e.key==='Escape')setEditingStepNote(null);}}
                          placeholder="添加备注..."
                          style={{width:'100%',fontSize:11,border:'1px solid #FDE68A',borderRadius:5,padding:'4px 8px',outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
                        <div style={{display:'flex',gap:4,marginTop:4}}>
                          <button onClick={()=>saveStepNote(step.idx)} style={{background:C.blue,color:'white',border:'none',borderRadius:4,padding:'3px 10px',fontSize:11,cursor:'pointer',fontWeight:600}}>保存</button>
                          <button onClick={()=>setEditingStepNote(null)} style={{background:'none',border:'1px solid #E5E7EB',borderRadius:4,padding:'3px 8px',fontSize:11,cursor:'pointer',color:'#6B7280'}}>取消</button>
                        </div>
                      </div>
                    )}
                    {/* Saved note */}
                    {!isEditN&&hasNote&&(
                      <div style={{padding:'2px 14px 5px 38px',fontSize:10,color:'#92400E',background:'#FFFBEB'}}>📌 {stepNotes[step.idx]}</div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OverviewTable({ records, onOpen, onUpdate, onNew, onImport, onDelete, onRestore, onCopy, siteFilter }) {
  const [editingCell, setEditingCell] = useState(null); // {id, field}
  const [cellVal, setCellVal] = useState('');
  const [blockerModal, setBlockerModal] = useState(null); // {r, val}
  const openBlockerModal = (r) => setBlockerModal({r, val: r.blocker||''});
  const saveBlockerModal = () => { if(blockerModal){save(blockerModal.r,{blocker:blockerModal.val.trim()}); setBlockerModal(null);} };
  const [searchQ, setSearchQ] = useState('');
  const [panelId, setPanelId] = useState(null);
  const [panelPhase, setPanelPhase] = useState(null);
  const [tableSearch, setTableSearch] = useState('');
  const [statusFilt, setStatusFilt] = useState('all');
  const panelRecord = panelId ? records.find(r=>r.id===panelId) : null;

  // Dropdown data
  const QUOTE_OPTIONS_ALL = ['USD','USDT','USDC','BTC','HKD','IDR','USDGO','RLUSD','AUSD','不涉及'];
  const CHAIN_OPTIONS = ['ERC20','BTC','TRC20','BEP20','Solana','Polygon','Avalanche','Arbitrum','Base','TON','XRP Ledger','Morph','ERC20/SOL','PLUME & ERC20','POL','BSC','Cardano','Injective','Toncoin','Litecoin','Sui','不上链'];
  const SITE_OPTIONS = [
    {id:'HK',     label:'OSL HK',    icon:'🇭🇰', bg:'#D6E4F0', color:'#1B3A6B'},
    {id:'Global', label:'Global',    icon:'🌐', bg:'#D4EFEC', color:'#1A7A6E'},
    {id:'ID',     label:'OSL ID',    icon:'🇮🇩', bg:'#EAD9F7', color:'#6A3D8F'},
    {id:'SG',     label:'SG',        icon:'🇸🇬', bg:'#DCFCE7', color:'#166534'},
  ];
  const PRODUCT_OPTIONS = ['Orderbook','RFQ','OTC','仅上链','StableHub','Launchpool','下币','理财代币-3CP','理财代币-托管类','WealthToken'];

  const SS = {
    in_progress: { bg:'#FEF3C7', color:'#D97706', label:'进行中' },
    not_started: { bg:'#F3F4F6', color:'#6B7280', label:'未开始' },
    completed:   { bg:'#D1FAE5', color:'#059669', label:'已完成' },
    cancelled:   { bg:'#F3F4F6', color:'#9CA3AF', label:'已取消' },
  };
  const SITE_S = { HK:{bg:'#D6E4F0',color:'#1B3A6B'}, Global:{bg:'#D4EFEC',color:'#1A7A6E'}, ID:{bg:'#EAD9F7',color:'#6A3D8F'}, SG:{bg:'#DCFCE7',color:'#166534'} };
  const USER_TYPES = ['PI（专业投资者）','零售 Retail','两者','不适用'];

  const save = (r, patch) => onUpdate({...r, ...patch, updatedAt:new Date().toISOString()});
  const stopEdit = () => setEditingCell(null);

  const STATUS_RANK = { in_progress:0, not_started:1, completed:2, cancelled:3 };
  const allRows = records
    .filter(r => !siteFilter || r.site===siteFilter)
    .filter(r => {
      if (!tableSearch) return true;
      const q = tableSearch.toLowerCase();
      return (r.tokenName||'').toLowerCase().includes(q)
          || (r.tokenSymbol||'').toLowerCase().includes(q)
          || (r.blocker||'').toLowerCase().includes(q)
          || (r.chainRaw||'').toLowerCase().includes(q);
    })
    .filter(r => {
      if (statusFilt==='all') return true;
      const cl = buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool});
      return getRecordStatus(r,cl.length)===statusFilt;
    })
    .sort((a,b) => {
      const clA = buildChecklist(a.site,a.product,a.tokenType,{stableHub:a.stableHub,launchpool:a.launchpool});
      const clB = buildChecklist(b.site,b.product,b.tokenType,{stableHub:b.stableHub,launchpool:b.launchpool});
      const rA = STATUS_RANK[getRecordStatus(a,clA.length)]??99;
      const rB = STATUS_RANK[getRecordStatus(b,clB.length)]??99;
      if (rA !== rB) return rA - rB;
      // Within same status: sort by expectedLaunchTime asc (nulls last)
      const ta = a.expectedLaunchTime ? new Date(a.expectedLaunchTime) : null;
      const tb = b.expectedLaunchTime ? new Date(b.expectedLaunchTime) : null;
      if (ta && tb) return ta - tb;
      if (ta) return -1;
      if (tb) return 1;
      return new Date(b.updatedAt)-new Date(a.updatedAt);
    });

  // Split into upcoming (≤7 working days, not completed/cancelled) and rest
  const upcoming = allRows.filter(r => {
    const st = getRecordStatus(r, buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool}).length);
    if (st==='completed'||st==='cancelled') return false;
    return workingDaysUntil(r.expectedLaunchTime) >= 0 && workingDaysUntil(r.expectedLaunchTime) <= 7;
  });
  const rest = allRows.filter(r => !upcoming.find(u=>u.id===r.id));

  const PHASE_COLS = [
    { key:'pre',        label:'前置', phaseName:'前置确认' },
    { key:'bd',         label:'BD',   phaseName:'业务评估' },
    { key:'compliance', label:'合规',  phaseName:'合规/VAAP' },
    { key:'exec',       label:'执行',  phaseName:'执行配置' },
    { key:'launch',     label:'上线',  phaseName:'正式上线' },
  ];

  const COLS = siteFilter
    ? ['#','项目名称','备注/卡点','区块链','状态','交易对','交易类型','用户类型','预计上线时间','进度','前置','BD','合规','执行','上线']
    : ['#','项目名称','备注/卡点','区块链','状态','交易对','站点','交易类型','用户类型','预计上线时间','进度'];
  const colN = COLS.length;

  const CellEdit = ({r, field, children}) => {
    const isEditing = editingCell?.id===r.id && editingCell?.field===field;
    return (
      <td style={{padding:0, position:'relative', maxWidth: field==='blocker'?160:field==='tokenName'?180:field==='quoteCurrencies'?150:120}}
        onClick={e=>{e.stopPropagation();if(!isEditing){setEditingCell({id:r.id,field});setSearchQ('');setCellVal(
          field==='blocker'?r.blocker||'':
          field==='userType'?r.userType||'':
          field==='expectedLaunchTime'?toInputVal(r.expectedLaunchTime):
          field==='quoteCurrencies'?JSON.stringify(r.quoteCurrencies||[]):
          field==='status'?getRecordStatus(r,buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool}).length):
          '');}
        }}>
        <div style={{padding:'8px 10px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
          minHeight:36, display:'flex', alignItems:'center',
          background: isEditing?'#EBF4FB':'transparent',
          outline: isEditing?'2px solid #2E75B6':'none', outlineOffset:-2,
          cursor:'default',
        }}>
          {children}
          {!isEditing && <span style={{marginLeft:'auto', opacity:0, fontSize:10, color:'#9CA3AF'}} className="edit-icon">✏</span>}
        </div>
        {/* Inline editor */}
        {isEditing && (
          <div style={{position:'absolute', top:'100%', left:0, zIndex:200, background:'white',
            border:'1px solid #E5E7EB', borderRadius:8, boxShadow:'0 8px 24px rgba(0,0,0,0.14)',
            minWidth:180, maxWidth:280}}
            onClick={e=>e.stopPropagation()}>

                <div>
                  <div style={{padding:'6px 8px',borderBottom:'1px solid #F3F4F6'}}>

                  </div>
                  <div style={{maxHeight:220,overflowY:'auto'}}>
                    {canCreate && (
                      <div onClick={()=>{save(r,{chainRaw:searchQ.trim(),chainLabels:[searchQ.trim()]});setSearchQ('');stopEdit();}}
                        style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:C.blue,fontWeight:600,borderBottom:'1px solid #F3F4F6'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#EBF4FB'}

                          color:cur===c?C.navy:'#374151',background:cur===c?'#EBF4FB':'white'}}

            {/* ── 交易对 (searchable multi-select) ── */}
            {field==='quoteCurrencies' && (() => {

                      </span>

                    <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} autoFocus={sel.length===0}
