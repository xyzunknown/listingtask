                  </div>
                  <div style={{maxHeight:200,overflowY:'auto'}}>
                    {canCreate && (
                      <div onClick={()=>{toggle(searchQ.trim());setSearchQ('');}}
                        style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:C.blue,fontWeight:600}}
                        onMouseEnter={e=>e.currentTarget.style.background='#EBF4FB'}
                        onMouseLeave={e=>e.currentTarget.style.background='white'}>
                        + 创建"{searchQ.trim()}"
                      </div>
                    )}
                    {filtered.map(q=>{
                      const s=sel.includes(q);
                      return (
                        <div key={q} onClick={()=>toggle(q)}
                          style={{padding:'8px 12px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                            background:s?'#EFF6FF':'white',color:s?'#1D4ED8':'#374151',fontWeight:s?700:400}}
                          onMouseEnter={e=>e.currentTarget.style.background=s?'#DBEAFE':'#F3F4F6'}
                          onMouseLeave={e=>e.currentTarget.style.background=s?'#EFF6FF':'white'}>
                          <span style={{width:14,height:14,borderRadius:3,border:`1.5px solid ${s?'#1D4ED8':'#D1D5DB'}`,
                            background:s?'#1D4ED8':'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            {s&&<span style={{color:'white',fontSize:9,fontWeight:900}}>✓</span>}
                          </span>
                          {q}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* ── 站点 ── */}
            {field==='site' && (
              <div>
                {SITE_OPTIONS.map(s=>(
                  <div key={s.id} onClick={()=>{save(r,{site:s.id});stopEdit();}}
                    style={{padding:'8px 12px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                      background:r.site===s.id?'#EBF4FB':'white'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                    onMouseLeave={e=>e.currentTarget.style.background=r.site===s.id?'#EBF4FB':'white'}>
                    <span>{s.icon}</span>
                    <span style={{fontWeight:r.site===s.id?700:400,color:r.site===s.id?s.color:'#374151'}}>{s.label}</span>
                    {r.site===s.id&&<span style={{marginLeft:'auto',color:s.color}}>✓</span>}
                  </div>
                ))}
              </div>
            )}

            {/* ── 交易类型 ── */}
            {field==='productDisplay' && (() => {
              const cur = r.productDisplay||r.product||'';
              const filtered = PRODUCT_OPTIONS.filter(p=>p.toLowerCase().includes(searchQ.toLowerCase()));
              const canCreate = searchQ.trim() && !PRODUCT_OPTIONS.includes(searchQ.trim());
              return (
                <div>
                  <div style={{padding:'6px 8px',borderBottom:'1px solid #F3F4F6'}}>
                    <input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                      placeholder="查找或创建选项"
                      style={{width:'100%',fontSize:12,border:'none',outline:'none',fontFamily:'inherit',background:'transparent'}}/>
                  </div>
                  <div style={{maxHeight:240,overflowY:'auto'}}>
                    {canCreate && (
                      <div onClick={()=>{save(r,{productDisplay:searchQ.trim()});setSearchQ('');stopEdit();}}
                        style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:C.blue,fontWeight:600,borderBottom:'1px solid #F3F4F6'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#EBF4FB'}
                        onMouseLeave={e=>e.currentTarget.style.background='white'}>
                        + 创建"{searchQ.trim()}"
                      </div>
                    )}
                    {filtered.map(p=>(
                      <div key={p} onClick={()=>{save(r,{productDisplay:p});setSearchQ('');stopEdit();}}
                        style={{padding:'8px 12px',fontSize:12,cursor:'pointer',fontWeight:cur===p?700:400,
                          color:cur===p?C.navy:'#374151',background:cur===p?'#EBF4FB':'white'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                        onMouseLeave={e=>e.currentTarget.style.background=cur===p?'#EBF4FB':'white'}>
                        {cur===p&&'✓ '}{p}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* ── 用户类型 ── */}
            {field==='userType' && (
              <div>
                {USER_TYPES.map(opt=>(
                  <div key={opt} onClick={()=>{save(r,{userType:opt});stopEdit();}}
                    style={{padding:'8px 12px',fontSize:12,cursor:'pointer',borderRadius:5,
                      background:r.userType===opt?'#EBF4FB':'white',color:r.userType===opt?C.navy:'#374151',fontWeight:r.userType===opt?700:400}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                    onMouseLeave={e=>e.currentTarget.style.background=r.userType===opt?'#EBF4FB':'white'}>
                    {opt}
                  </div>
                ))}
                <div onClick={()=>{save(r,{userType:''});stopEdit();}}
                  style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:'#9CA3AF',borderTop:'1px solid #F3F4F6'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                  onMouseLeave={e=>e.currentTarget.style.background='white'}>— 清除</div>
              </div>
            )}

            {/* ── 预计上线时间 ── */}
            {field==='expectedLaunchTime' && (
              <div style={{padding:8}}>
                <input type="datetime-local" autoFocus value={cellVal} onChange={e=>setCellVal(e.target.value)} step="3600"
                  style={{width:'100%',fontSize:12,border:'1.5px solid #2E75B6',borderRadius:6,padding:'5px',outline:'none',boxSizing:'border-box'}}/>
                <div style={{display:'flex',gap:4,marginTop:6}}>
                  <button onClick={()=>{save(r,{expectedLaunchTime:cellVal?new Date(cellVal).toISOString():null});stopEdit();}}
                    style={{flex:1,background:C.blue,color:'white',border:'none',borderRadius:6,padding:'5px 0',fontSize:12,cursor:'pointer',fontWeight:600}}>保存</button>
                  <button onClick={stopEdit} style={{flex:1,background:'none',border:'1px solid #E5E7EB',borderRadius:6,padding:'5px 0',fontSize:12,cursor:'pointer',color:'#6B7280'}}>取消</button>
                </div>
              </div>
            )}

            {/* ── 状态 ── */}
            {field==='status' && (
              <div>
                <div style={{padding:'6px 12px 4px',fontSize:11,color:'#9CA3AF',fontWeight:600}}>切换状态</div>
                {[{v:false,l:'进行中/未开始',ic:'🔄'},{v:true,l:'标记为取消',ic:'⏸'}].map(({v,l,ic})=>(
                  <div key={l} onClick={()=>{save(r,{cancelled:v,cancelReason:v?'手动标记取消':''});stopEdit();}}
                    style={{padding:'8px 12px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:8,color:'#374151'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
                    onMouseLeave={e=>e.currentTarget.style.background='white'}>
                    <span>{ic}</span>{l}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </td>
    );
  };

  const RowRender = ({r, idx, isUpcoming}) => {
    const cl = buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool});
    const done = countDone(r.checked, r.naSteps);
    const pct = cl.length?Math.round(done/cl.length*100):0;
    const status = getRecordStatus(r, cl.length);
    const ss = SS[status]||SS.not_started;
    const siteS = SITE_S[r.site]||{bg:'#F3F4F6',color:'#374151'};
    const siteInfo = SITES.find(s=>s.id===r.site);
    const isCancelled = status==='cancelled';
    const wdays = workingDaysUntil(r.expectedLaunchTime);
    const isSelected = panelId === r.id;
    return (
      <tr key={r.id}
        style={{borderBottom:'1px solid #F0F0F0', opacity:isCancelled?0.45:1,
          background: isSelected?'#EBF4FB': isUpcoming?'#FFFBEB': idx%2===0?'white':'#FAFAFA',
          outline: isSelected?'2px solid #2E75B6 inset':'none'}}
        onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background=isUpcoming?'#FEF3C7':'#F0F7FF';}}
        onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background=isUpcoming?'#FFFBEB':idx%2===0?'white':'#FAFAFA';}}>
        {/* # */}
        <td style={{padding:'8px', textAlign:'center', color:'#9CA3AF', fontSize:11, width:36, cursor:'default'}}>{idx+1}</td>
        {/* 项目名称 — click opens panel */}
        <td onClick={()=>setPanelId(isSelected?null:r.id)} style={{padding:'8px 10px', fontWeight:600, color: isSelected?C.blue:'#111827', fontSize:13,
          cursor:'pointer', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:180}}>
          {r.tokenSymbol || (r.tokenName||'').split('/')[0]}
        </td>
        {/* 备注/卡点 — opens modal for Chinese input + resizable */}
        <td onClick={e=>{e.stopPropagation();openBlockerModal(r);}}
          style={{padding:'8px 10px', cursor:'pointer', maxWidth:200, minWidth:120,
            borderBottom:'1px solid #F3F4F6'}}>
          {r.blocker
            ? <span style={{color:'#C2410C', fontSize:12, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden', lineHeight:1.5}}>🚧 {r.blocker}</span>
            : <span style={{color:'#D1D5DB', fontSize:12, fontStyle:'italic'}}>—</span>}
        </td>
        {/* 区块链 — searchable dropdown */}
        <CellEdit r={r} field="chainRaw">
          <span style={{color:'#0369A1', fontSize:12, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
            {r.chainRaw||(r.chainLabels||[]).join('/')||'—'}
          </span>
        </CellEdit>
        {/* 状态 */}
        <CellEdit r={r} field="status">
          <span style={{background:ss.bg, color:ss.color, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99, whiteSpace:'nowrap'}}>{ss.label}</span>
        </CellEdit>
        {/* 交易对 — multi-select searchable */}
        <CellEdit r={r} field="quoteCurrencies">
          {r.chainOnly
            ? <span style={{background:'#EDE9FE',color:'#7C3AED',fontSize:11,fontWeight:600,padding:'1px 7px',borderRadius:99}}>仅上链</span>
            : (r.quoteCurrencies||[]).length>0
              ? <div style={{display:'flex',gap:3,flexWrap:'nowrap',overflow:'hidden'}}>
                  {(r.quoteCurrencies||[]).slice(0,3).map((q,i)=>(
                    <span key={i} style={{background:'#EFF6FF',color:'#1D4ED8',fontSize:11,fontWeight:600,padding:'1px 6px',borderRadius:99,whiteSpace:'nowrap'}}>{q}</span>
                  ))}
                  {(r.quoteCurrencies||[]).length>3 && <span style={{fontSize:11,color:'#9CA3AF'}}>+{(r.quoteCurrencies||[]).length-3}</span>}
                </div>
              : <span style={{color:'#D1D5DB',fontSize:12,fontStyle:'italic'}}>—</span>
          }
        </CellEdit>
        {/* 站点 — dropdown */}
        {!siteFilter && (
          <CellEdit r={r} field="site">
            <span style={{background:siteS.bg,color:siteS.color,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,whiteSpace:'nowrap'}}>
              {siteInfo?.icon} {r.site}
            </span>
          </CellEdit>
        )}
        {/* 交易类型 — searchable dropdown */}
        <CellEdit r={r} field="productDisplay">
          <span style={{background:'#F3F4F6',color:'#374151',fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:99,whiteSpace:'nowrap'}}>
            {r.productDisplay||r.product}{r.stableHub?' +SH':''}{r.launchpool?' +LP':''}
          </span>
        </CellEdit>
        {/* 用户类型 */}
        <CellEdit r={r} field="userType">
          <span style={{fontSize:12, color:'#6B7280', whiteSpace:'nowrap'}}>{r.userType||'—'}</span>
        </CellEdit>
        {/* 预计上线时间 */}
        <CellEdit r={r} field="expectedLaunchTime">
          {r.expectedLaunchTime
            ? <span style={{fontSize:12, color: isUpcoming&&wdays<=2?'#DC2626':'#D97706', fontWeight:600, whiteSpace:'nowrap'}}>
                {fmtLaunchTime(r.expectedLaunchTime)}
                {isUpcoming && <span style={{marginLeft:5, fontSize:10, opacity:.8}}>{wdays===0?'今天':wdays===1?'明天':`${wdays}天`}</span>}
              </span>
            : <span style={{fontSize:12, color:'#D1D5DB', fontStyle:'italic'}}>—</span>
          }
        </CellEdit>
        {/* 进度 */}
        <td style={{padding:'8px 10px'}}>
          <div style={{display:'flex', alignItems:'center', gap:5, cursor:'pointer'}} onClick={()=>setPanelId(isSelected?null:r.id)}>
            <div style={{width:36, background:'#E5E7EB', borderRadius:99, height:4, overflow:'hidden', flexShrink:0}}>
              <div style={{width:`${pct}%`, height:'100%', background:pct===100?'#059669':C.blue, borderRadius:99, transition:'width .3s'}}/>
            </div>
            <span style={{fontSize:11, color:'#9CA3AF', whiteSpace:'nowrap'}}>{done}/{cl.length}</span>
          </div>
        </td>
        {/* 阶段进度 — 仅分站点视图 */}
        {siteFilter && PHASE_COLS.map(p => {
          const ps = cl.map((step,i)=>({...step,idx:i})).filter(s=>s.phase===p.phaseName);
          if (ps.length===0) return <td key={p.key} style={{padding:'5px 4px', textAlign:'center'}}><span style={{color:'#E5E7EB',fontSize:11}}>—</span></td>;
          const phDone = ps.filter(s=>(r.checked||{})[s.idx]||(r.naSteps||{})[s.idx]).length;
          const allDone = phDone===ps.length;
          const someDone = phDone>0;
          const PHASE_BG = {pre:allDone?'#D1FAE5':someDone?'#FEF3C7':'#F3F4F6',bd:allDone?'#D1FAE5':someDone?'#DBEAFE':'#F3F4F6',compliance:allDone?'#D1FAE5':someDone?'#FCE7F3':'#F3F4F6',exec:allDone?'#D1FAE5':someDone?'#D1FAE5':'#F3F4F6',launch:allDone?'#D1FAE5':someDone?'#EDE9FE':'#F3F4F6'};
          const PHASE_C  = {pre:allDone?'#059669':someDone?'#92400E':'#9CA3AF',bd:allDone?'#059669':someDone?'#1E40AF':'#9CA3AF',compliance:allDone?'#059669':someDone?'#BE185D':'#9CA3AF',exec:allDone?'#059669':someDone?'#065F46':'#9CA3AF',launch:allDone?'#059669':someDone?'#5B21B6':'#9CA3AF'};
          return (
            <td key={p.key} style={{padding:'5px 4px', textAlign:'center'}}
              onClick={e=>{e.stopPropagation();if(isSelected&&panelPhase===p.key){setPanelId(null);setPanelPhase(null);}else{setPanelId(r.id);setPanelPhase(p.key);}}}>
              <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer'}}>
                <div style={{width:28,height:4,borderRadius:99,background:PHASE_BG[p.key],border:`1px solid ${PHASE_C[p.key]}30`,overflow:'hidden'}}>
                  <div style={{width:`${ps.length?phDone/ps.length*100:0}%`,height:'100%',background:PHASE_C[p.key],borderRadius:99}}/>
                </div>
                <span style={{fontSize:9,color:PHASE_C[p.key],fontWeight:600,lineHeight:1}}>{phDone}/{ps.length}</span>
              </div>
            </td>
          );
        })}
      </tr>
    );
  };

  // Export to Excel
  const exportExcel = () => {
    const PHASE_NAMES = [
      {key:'pre',phaseName:'前置确认'},{key:'bd',phaseName:'业务评估'},
      {key:'compliance',phaseName:'合规/VAAP'},{key:'exec',phaseName:'执行配置'},{key:'launch',phaseName:'正式上线'},
    ];
    const headers = ['#','代币名称','站点','产品类型','状态','进度%','完成/总计','预计上线时间','备注/卡点','区块链','前置','BD','合规','执行','上线'];
    const rows = records.filter(r=>!siteFilter||r.site===siteFilter).map((r,i)=>{
      const cl = buildChecklist(r.site,r.product,r.tokenType,{stableHub:r.stableHub,launchpool:r.launchpool});
      const done = countDone(r.checked,r.naSteps);
      const status = getRecordStatus(r,cl.length);
      const statusLabel = {not_started:'未开始',in_progress:'进行中',completed:'已完成',cancelled:'已取消'}[status]||status;
      const phases = PHASE_NAMES.map(p=>{
        const ps = cl.map((s,idx)=>({...s,idx})).filter(s=>s.phase===p.phaseName);
        if (!ps.length) return 'N/A';
        const pd = ps.filter(s=>(r.checked||{})[s.idx]||(r.naSteps||{})[s.idx]).length;
        return `${pd}/${ps.length}`;
      });
      return [
        i+1, r.tokenName||r.tokenSymbol||'', r.site,
        r.product+(r.stableHub?' +SH':'')+(r.launchpool?' +LP':''),
        statusLabel,
        cl.length?`${Math.round(done/cl.length*100)}%`:'0%',
        `${done}/${cl.length}`,
        r.expectedLaunchTime?new Date(r.expectedLaunchTime).toLocaleString('zh-CN'):'',
        r.blocker||'',
        r.chainRaw||(r.chainLabels||[]).join('/')||'',
        ...phases,
      ];
    });
    const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
    ws['!cols'] = [4,14,8,12,7,6,8,14,20,10,6,6,6,6,6].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '上币进度');
    XLSX.writeFile(wb, `OSL上币进度_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // Close dropdown on outside click
  useEffect(()=>{
    const handler = ()=>setEditingCell(null);
    document.addEventListener('click', handler);
    return ()=>document.removeEventListener('click', handler);
  },[]);

  const STATUS_CHIPS = [
    {key:'all', label:'全部', color:'#374151', bg:'#F3F4F6'},
    {key:'in_progress', label:'进行中', color:'#D97706', bg:'#FEF3C7'},
    {key:'not_started', label:'未开始', color:'#6B7280', bg:'#F9FAFB'},
    {key:'completed',   label:'已完成', color:'#059669', bg:'#D1FAE5'},
    {key:'cancelled',   label:'已取消', color:'#9CA3AF', bg:'#F3F4F6'},
  ];

  return (
    <div style={{display:'flex', flexDirection:'row', height:'100%'}} onClick={()=>setEditingCell(null)}>
      {/* Left: toolbar + table */}
      <div style={{display:'flex', flexDirection:'column', flex:1, minWidth:0, overflow:'hidden'}}>
        {/* Toolbar */}
        <div style={{borderBottom:'1px solid #E5E7EB', background:'white', flexShrink:0}}>
          {/* Top row */}
          <div style={{display:'flex', alignItems:'center', gap:8, padding:'9px 16px'}}>
            <div style={{fontWeight:700, fontSize:14, color:'#111827'}}>上币进度</div>
            <span style={{fontSize:11, color:'#9CA3AF', marginRight:'auto'}}>
              {allRows.length < records.filter(r=>!siteFilter||r.site===siteFilter).length
                ? `${allRows.length} / ${records.filter(r=>!siteFilter||r.site===siteFilter).length} 条`
                : `${allRows.length} 条记录`}
            </span>
            <button onClick={exportExcel}
              style={{background:'white',color:'#374151',border:'1px solid #E5E7EB',borderRadius:7,padding:'5px 11px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              📤 导出
            </button>
            <button onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='.xlsx,.xls';i.onchange=e=>onImport(e.target.files[0]);i.click();}}
              style={{background:'white',color:'#374151',border:'1px solid #E5E7EB',borderRadius:7,padding:'5px 11px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              📥 导入
            </button>
            <button onClick={()=>onNew()}
              style={{background:C.blue,color:'white',border:'none',borderRadius:7,padding:'5px 13px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
              + 添加记录
            </button>
          </div>
          {/* Search + filter row */}
          <div style={{display:'flex', alignItems:'center', gap:8, padding:'0 16px 9px', flexWrap:'wrap'}}>
            <div style={{position:'relative', flexShrink:0}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'#9CA3AF',pointerEvents:'none'}}>🔍</span>
              <input value={tableSearch} onChange={e=>setTableSearch(e.target.value)}
                placeholder="搜索代币名称..."
                style={{fontSize:12,border:'1px solid #E5E7EB',borderRadius:7,padding:'5px 10px 5px 28px',
                  outline:'none',width:160,fontFamily:'inherit',background:tableSearch?'#EBF4FB':'white'}}/>
              {tableSearch && <span onClick={()=>setTableSearch('')}
                style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:12,color:'#9CA3AF'}}>✕</span>}
            </div>
            <div style={{display:'flex', gap:4}}>
              {STATUS_CHIPS.map(chip=>(
                <button key={chip.key} onClick={()=>setStatusFilt(chip.key)}
                  style={{fontSize:11,padding:'3px 10px',borderRadius:99,cursor:'pointer',fontWeight:statusFilt===chip.key?700:500,
                    background:statusFilt===chip.key?chip.bg:'transparent',
                    color:statusFilt===chip.key?chip.color:'#9CA3AF',
                    border:`1px solid ${statusFilt===chip.key?chip.color+'60':'#E5E7EB'}`}}>
                  {chip.label}
                </button>
              ))}
            </div>
          </div>
        </div>
        {/* Table */}
        <div style={{flex:1, overflow:'auto'}} onClick={e=>e.stopPropagation()}>
          <style>{`.edit-icon{opacity:0}.hover-row:hover .edit-icon{opacity:1}`}</style>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:13, tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:36}}/><col style={{width:140}}/><col style={{width:130}}/><col style={{width:80}}/>
              <col style={{width:74}}/><col style={{width:110}}/>
              {!siteFilter && <col style={{width:72}}/>}
              <col style={{width:80}}/><col style={{width:72}}/><col style={{width:95}}/><col style={{width:58}}/>
              {siteFilter && PHASE_COLS.map(p=><col key={p.key} style={{width:42}}/>)}
            </colgroup>
            <thead>
              <tr style={{background:'#F8FAFC', position:'sticky', top:0, zIndex:10}}>
                {COLS.map((c,ci)=>{
                  const isPhaseCol = siteFilter && ci >= COLS.length - PHASE_COLS.length;
                  const phaseIdx = isPhaseCol ? ci - (COLS.length - PHASE_COLS.length) : -1;
                  const PHASE_BG = ['#FEF3C7','#DBEAFE','#FCE7F3','#D1FAE5','#EDE9FE'];
                  const PHASE_C  = ['#92400E','#1E40AF','#BE185D','#065F46','#5B21B6'];
                  return (
                    <th key={c} style={{padding: isPhaseCol?'7px 4px':'9px 10px', textAlign: isPhaseCol?'center':'left',
                      fontWeight:700, color: isPhaseCol?PHASE_C[phaseIdx]:'#374151',
                      borderBottom:'2px solid #E5E7EB', fontSize:11, whiteSpace:'nowrap', overflow:'hidden',
                      background: isPhaseCol?PHASE_BG[phaseIdx]:'#F8FAFC',
                      borderLeft: isPhaseCol?`2px solid ${PHASE_C[phaseIdx]}30`:undefined,
                    }}>{c}</th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {/* 即将上线 section */}
              {upcoming.length>0 && <>
                <tr><td colSpan={colN} style={{padding:'8px 10px', background:'#FEF3C7', borderBottom:'1px solid #FDE68A'}}>
                  <span style={{fontSize:12, fontWeight:800, color:'#92400E'}}>🚀 即将上线</span>
                  <span style={{fontSize:11, color:'#B45309', marginLeft:8}}>7个工作日内 · {upcoming.length}个项目</span>
                </td></tr>
                {upcoming.map((r,i)=><RowRender key={r.id} r={r} idx={i+1} isUpcoming={true}/>)}
                <tr><td colSpan={colN} style={{padding:'6px 10px', background:'#F8FAFC', borderBottom:'2px solid #E5E7EB'}}>
                  <span style={{fontSize:11, color:'#9CA3AF', fontWeight:600}}>其他记录</span>
                </td></tr>
              </>}
              {/* Rest */}
              {rest.map((r,i)=><RowRender key={r.id} r={r} idx={i+1} isUpcoming={false}/>)}
              {allRows.length===0 && (
                <tr><td colSpan={colN} style={{textAlign:'center', padding:'60px 0', color:'#9CA3AF', fontSize:13}}>
                  暂无记录，点击「+ 添加记录」新建
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      {/* Right: detail panel */}
      {panelRecord && (
        <DetailPanel
          record={panelRecord}
          onClose={()=>{setPanelId(null);setPanelPhase(null);}}
          onUpdate={onUpdate}
          onOpenFull={onOpen}
          onCopy={onCopy}
          scrollToPhase={panelPhase}
        />
      )}

      {/* ── 备注/卡点 Modal ── */}
      {blockerModal && (
        <div style={{position:'fixed',inset:0,zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.35)'}}
          onClick={()=>setBlockerModal(null)}>
          <div style={{background:'white',borderRadius:12,padding:24,width:520,maxWidth:'90vw',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:'#111827'}}>
              ✏️ 备注 / 卡点 — {blockerModal.r.tokenName||blockerModal.r.tokenSymbol||'未命名'}
            </div>
            <textarea
              autoFocus
              value={blockerModal.val}
              onChange={e=>setBlockerModal(m=>({...m, val:e.target.value}))}
              placeholder="输入备注或卡点说明（支持中文，可拖拽右下角调整大小）"
              rows={5}
              style={{
                width:'100%', boxSizing:'border-box',
                fontSize:13, lineHeight:1.7,
                border:'1.5px solid #2E75B6', borderRadius:8,
                padding:'10px 12px', outline:'none',
                fontFamily:'inherit', resize:'both',
                minHeight:120, color:'#374151',
              }}
            />
            <div style={{display:'flex',gap:8,marginTop:14,justifyContent:'flex-end'}}>
              <button onClick={()=>setBlockerModal(null)}
                style={{background:'none',border:'1px solid #E5E7EB',borderRadius:8,padding:'8px 20px',fontSize:13,cursor:'pointer',color:'#6B7280',fontWeight:600}}>
                取消
              </button>
              <button onClick={saveBlockerModal}
                style={{background:C.blue,color:'white',border:'none',borderRadius:8,padding:'8px 24px',fontSize:13,cursor:'pointer',fontWeight:700}}>
                保存
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ page, onPage, records }) {
  const counts = { HK:0, Global:0, ID:0 };
  records.forEach(r => { if(counts[r.site]!==undefined && !r.cancelled) counts[r.site]++; });
  const total = records.filter(r=>!r.cancelled).length;

  const NavItem = ({ id, icon, label, count, indent }) => (
    <div onClick={()=>onPage(id)} style={{
      display:'flex', alignItems:'center', gap:6, padding: indent ? '6px 8px 6px 22px' : '7px 12px',
      cursor:'pointer', borderRadius:7, margin:'1px 8px',
      background: page===id ? 'rgba(255,255,255,0.15)' : 'transparent',
      color: page===id ? 'white' : 'rgba(255,255,255,0.7)',
      fontWeight: page===id ? 700 : 400, fontSize:13, transition:'all 0.1s',
    }}
    onMouseEnter={e=>{ if(page!==id) e.currentTarget.style.background='rgba(255,255,255,0.08)'; }}
    onMouseLeave={e=>{ if(page!==id) e.currentTarget.style.background='transparent'; }}>
      <span style={{fontSize:15}}>{icon}</span>
      <span style={{flex:1}}>{label}</span>
      {count!=null && <span style={{fontSize:11, background:'rgba(255,255,255,0.2)', borderRadius:99, padding:'1px 7px', fontWeight:700}}>{count}</span>}
    </div>
  );

  return (
    <div style={{
      width:160, background:C.navy, height:'100vh', flexShrink:0,
      display:'flex', flexDirection:'column', overflow:'hidden',
      borderRight:'1px solid rgba(255,255,255,0.1)',
    }}>
      {/* Logo */}
      <div style={{padding:'14px 12px 10px', borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{color:'white', fontWeight:800, fontSize:13}}>OSL 上币</div>
        <div style={{color:'rgba(255,255,255,0.45)', fontSize:10, marginTop:2}}>Listing Ops</div>
      </div>
      {/* Nav */}
      <div style={{flex:1, overflowY:'auto', padding:'10px 0'}}>
        <NavItem id="overview" icon="📋" label="总表" count={total} />
        <div style={{padding:'10px 16px 4px', fontSize:11, color:'rgba(255,255,255,0.4)', fontWeight:600, letterSpacing:0.5}}>分站点</div>
        <NavItem id="HK"     icon="🇭🇰" label="香港站"   count={counts.HK}     indent />
        <NavItem id="Global" icon="🌐" label="国际站"   count={counts.Global} indent />
        <NavItem id="ID"     icon="🇮🇩" label="印尼站"   count={counts.ID}     indent />
      </div>
      {/* Footer */}
      <div style={{padding:'12px 16px', borderTop:'1px solid rgba(255,255,255,0.1)', fontSize:11, color:'rgba(255,255,255,0.35)'}}>
        已同步至云端
      </div>
    </div>
  );
}

// ─── Site View (tabbed) ───────────────────────────────────────────────────────
const SITE_TABS = {
  HK:     [
    { key:'all',         label:'全部',     products:null },
    { key:'orderbook',   label:'Orderbook',  products:['Orderbook'] },
    { key:'rfq_otc',     label:'RFQ / OTC',  products:['RFQ','OTC'] },
    { key:'wealth',      label:'理财代币',    products:['WealthToken'] },
    { key:'chainonly',   label:'仅上链',     products:['ChainOnly'] },
    { key:'maintenance', label:'网络维护',    products:['Maintenance'] },
  ],
  Global: [
    { key:'all',         label:'全部',     products:null },
    { key:'orderbook',   label:'Orderbook',  products:['Orderbook'] },
    { key:'rfq_otc',     label:'RFQ / OTC',  products:['RFQ','OTC'] },
    { key:'stablehub',   label:'StableHub',  products:['RFQ'], filter: r=>r.stableHub },
    { key:'perp',        label:'Perp',       products:['Perp'] },
    { key:'chainonly',   label:'仅上链',     products:['ChainOnly'] },
    { key:'maintenance', label:'网络维护',    products:['Maintenance'] },
  ],
  ID:     [
    { key:'all',         label:'全部',     products:null },
    { key:'orderbook',   label:'Orderbook',  products:['Orderbook'] },
    { key:'launchpool',  label:'Launchpool', products:['Orderbook'], filter: r=>r.launchpool },
    { key:'chainonly',   label:'仅上链',     products:['ChainOnly'] },
    { key:'maintenance', label:'网络维护',    products:['Maintenance'] },
  ],
  SG:     [
    { key:'all',         label:'全部',     products:null },
    { key:'rfq_otc',     label:'RFQ / OTC',  products:['RFQ','OTC'] },
    { key:'chainonly',   label:'仅上链',     products:['ChainOnly'] },
    { key:'maintenance', label:'网络维护',    products:['Maintenance'] },
  ],
};

function SiteView({ site, records, onOpen, onUpdate, onNew, onImport, onDelete, onRestore, onCopy }) {
  const [activeTab, setActiveTab] = useState('all');
  const tabs = SITE_TABS[site] || SITE_TABS.HK;
  const tab = tabs.find(t=>t.key===activeTab) || tabs[0];

  // Count per tab
  const siteRecords = records.filter(r=>r.site===site);
  const countFor = (t) => {
    let rs = siteRecords;
    if (t.products) rs = rs.filter(r=>t.products.includes(r.product));
    if (t.filter)   rs = rs.filter(t.filter);
    return rs.length;
  };

  // Build productFilter for OverviewTable
  const productFilter = tab.products;
  const extraFilter = tab.filter;

  // Filter records for this tab
  const tabRecords = records.filter(r => {
    if (r.site !== site) return false;
    if (productFilter && !productFilter.includes(r.product)) return false;
    if (extraFilter && !extraFilter(r)) return false;
    return true;
  });

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
      {/* Tab bar */}
      <div style={{display:'flex', alignItems:'center', gap:2, padding:'0 16px',
        background:'white', borderBottom:'1px solid #E5E7EB', flexShrink:0, overflowX:'auto'}}>
        {tabs.map(t => {
          const cnt = countFor(t);
          const active = t.key===activeTab;
          return (
            <button key={t.key} onClick={()=>setActiveTab(t.key)} style={{
              border:'none', background:'none', cursor:'pointer',
              padding:'11px 14px', fontSize:13, fontWeight: active?700:400,
              color: active?C.navy:'#6B7280', borderBottom: active?`2px solid ${C.navy}`:'2px solid transparent',
              whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:5,
              marginBottom:-1,
            }}>
              {t.label}
              {cnt>0 && <span style={{fontSize:11, background: active?C.navy:'#E5E7EB', color: active?'white':'#6B7280',
                borderRadius:99, padding:'1px 6px', fontWeight:700}}>{cnt}</span>}
            </button>
          );
        })}
      </div>
      {/* Table */}
      <div style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
        <OverviewTable
          records={tabRecords}
          onOpen={onOpen}
          onUpdate={onUpdate}
          onNew={onNew}
          onImport={onImport}
          onDelete={onDelete}
          onRestore={onRestore}
          onCopy={onCopy}
          siteFilter={site}
        />
      </div>
    </div>
  );
}

// ─── App shell ────────────────────────────────────────────────────────────────
function App() {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('dashboard');
  const [sidebarPage, setSidebarPage] = useState('overview'); // 'overview'|'HK'|'Global'|'ID'
  const [activeId, setActiveId] = useState(null);
  const [toasts, setToasts] = useState([]);

  // 初始加载 + 本地数据迁移 + 实时同步
  useEffect(() => {
    loadRecordsFromDB().then(async cloudData => {
      // 检查 localStorage 是否有旧数据需要迁移
      const LOCAL_KEY = 'osl_listing_records_v2';
      let localData = [];
      try { localData = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]'); } catch {}

      if (localData.length > 0) {
        // 有本地数据：把本地没有的条目上传到云端（避免覆盖云端已有的）
        const cloudIds = new Set(cloudData.map(r => r.id));
        const toMigrate = localData.filter(r => !cloudIds.has(r.id));
        if (toMigrate.length > 0) {
          await Promise.all(toMigrate.map(r => syncRecord(r)));
        }
        // 合并云端已有 + 本地迁移的
        const merged = [...cloudData, ...toMigrate];
        setRecords(merged);
        // 清除本地缓存，防止重复迁移
        localStorage.removeItem(LOCAL_KEY);
        if (toMigrate.length > 0) {
          setTimeout(() => addToast(`✅ 已将 ${toMigrate.length} 条本地任务迁移到云端`, 'success'), 500);
        }
      } else {
        setRecords(cloudData);
      }
      setLoading(false);
    });
    const channel = db.channel('listing-sync')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'listing_records' }, payload => {
        if (payload.eventType === 'DELETE') {
          setRecords(prev => prev.filter(r => r.id !== payload.old.id));
        } else {
          const incoming = payload.new.data;
          setRecords(prev => {
            const exists = prev.find(r => r.id === incoming.id);
            return exists ? prev.map(r => r.id === incoming.id ? incoming : r) : [...prev, incoming];
          });
        }
      }).subscribe();
    return () => db.removeChannel(channel);
  }, []);

  const addToast = (msg, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(prev=>[...prev, {id, msg, type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)), 3500);
  };

  const activeRecord = records.find(r=>r.id===activeId);

  const handleSave = (recordOrArr) => {
    const arr = Array.isArray(recordOrArr) ? recordOrArr : [recordOrArr];
    arr.forEach(r => syncRecord(r));
    setRecords(prev=>[...prev, ...arr]);
    if (arr.length === 1) {
      setActiveId(arr[0].id);
      setView('checklist');
      addToast(`🆕 已创建任务：${arr[0].tokenName}`, 'success');
    } else {
      setView('dashboard');
      addToast(`🆕 已创建 ${arr.length} 条任务：${arr.map(r=>r.product).join(' + ')}`, 'success');
    }
  };

  const handleUpdate = (updated, toastMsg='') => {
    setRecords(prev=>prev.map(r=>r.id===updated.id?updated:r));
    syncRecord(updated);
    if (toastMsg) addToast(toastMsg);
  };

  const handleDelete = (id, reason='') => {
    const r = records.find(r=>r.id===id);
    const updated = {...r, cancelled:true, cancelReason:reason, updatedAt:new Date().toISOString()};
    setRecords(prev=>prev.map(r=>r.id===id ? updated : r));
    syncRecord(updated);
    addToast(`⏸ 已取消：${r?.tokenName||''}`, 'warn');
  };

  const handleRestore = (id) => {
    const r = records.find(r=>r.id===id);
    const updated = {...r, cancelled:false, cancelReason:'', updatedAt:new Date().toISOString()};
    setRecords(prev=>prev.map(r=>r.id===id ? updated : r));
    syncRecord(updated);
    addToast(`↩ 已恢复：${r?.tokenName||''}`, 'success');
  };

  const handleCopy = (record, targetSite) => {
    const newRecord = {
      ...record,
      id: genId(),
      site: targetSite,
      checked: {},
      naSteps: {},
      stepNotes: {},
      stepFields: {},
      cancelled: false,
      cancelReason: '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    syncRecord(newRecord);
    setRecords(prev=>[newRecord,...prev]);
    const siteLabel = SITES.find(s=>s.id===targetSite)?.label || targetSite;
    addToast(`📋 已复制：${record.tokenName} → ${siteLabel}`, 'success');
  };

  const handleImport = (arr) => {
    arr.forEach(r => syncRecord(r));
    setRecords(prev => [...prev, ...arr]);
    addToast(`📥 已导入 ${arr.length} 条记录`, 'success');
  };

  const handleOpen = (id) => { setActiveId(id); setView('checklist'); };
  const handleBack = () => { setActiveId(null); setView('dashboard'); };
  const handleImportFile = (file) => {
    if (!file) return;
    // reuse same XLSX parse logic inline
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const SITE_MAP = {'OSL HK':'HK','HK':'HK','Global':'Global','OSL Global':'Global','OSL ID':'ID','OSL ID ':'ID','ID':'ID'};
        const PRODUCT_MAP = {'OTC':'OTC','Orderbook':'Orderbook','RFQ':'RFQ','仅上链':'ChainOnly','理财代币':'WealthToken'};
        const IGNORE_PRODUCTS = ['StableHub','Launchpool'];
        const newRecords = [];
        rows.forEach(row => {
          const ticker = (row['Token Ticker']||row['Token']||'').toString().trim();
          if (!ticker) return;
          const siteRaw = (row['站点']||row['Site']||'').toString().trim();
          const productRaw = (row['交易类型']||row['Product']||'').toString().trim();
          const siteParts = siteRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const sites = siteParts.map(s=>SITE_MAP[s]).filter(Boolean);
          if (sites.length===0) sites.push('HK');
          const productParts = productRaw.split(',').map(s=>s.trim()).filter(Boolean);
          const stableHub = productParts.some(p=>p==='StableHub');
          const launchpool = productParts.some(p=>p==='Launchpool');
          const products = productParts.filter(p=>!IGNORE_PRODUCTS.includes(p)).map(p=>PRODUCT_MAP[p]).filter(Boolean);
          if (products.length===0) products.push('OTC');
          const chainRaw = (row['区块链']||'').toString().trim();
          const chainLabels = chainRaw ? chainRaw.split('/').map(s=>s.trim()).filter(Boolean) : [];
          const quoteRaw = (row['交易对名称']||row['交易对']||'').toString().trim();
          const quoteCurrencies = quoteRaw ? quoteRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
          let expectedLaunchTime = null;
          const ltRaw = row['预计上线时间']||'';
          if (ltRaw instanceof Date) expectedLaunchTime = ltRaw.toISOString();
          else if (typeof ltRaw==='number'&&ltRaw>0) { try{ const d=XLSX.SSF.parse_date_code(ltRaw); if(d) expectedLaunchTime=new Date(d.y,d.m-1,d.d,d.H||0,d.M||0).toISOString(); }catch{} }
          else if (typeof ltRaw==='string'&&ltRaw.trim()) { const p=new Date(ltRaw.trim()); if(!isNaN(p)) expectedLaunchTime=p.toISOString(); }
          const userType = (row['用户类型']||'').toString().trim();
          const expectedMM = (row['做市商']||'').toString().trim();
          const tokenSymbol = ticker.toUpperCase();
          const tokenName = quoteCurrencies.length>0 ? quoteCurrencies.map(q=>`${tokenSymbol}/${q}`).join(', ') : tokenSymbol;
          sites.forEach(site => {
            products.forEach(product => {
              newRecords.push({
                _key: tokenSymbol+'|'+site+'|'+product,
                id:genId(), tokenName, tokenSymbol, quoteCurrencies,
                chainLabels, chainOnly:product==='ChainOnly', chains:[],
                userType, expectedMM, expectedLaunchTime,
                site, product, tokenType:'subtoken',
                stableHub: site==='Global'&&product==='RFQ'?stableHub:false,
                launchpool: site==='ID'?launchpool:false,
                blocker:'', checked:{}, naSteps:{}, stepNotes:{}, notes:'',
                createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
                estimatedTime:estimateTime(site,product,'subtoken'),
              });
            });
          });
        });
        const existingKeys = new Set(records.map(r=>(r.tokenSymbol||r.tokenName).toUpperCase()+'|'+r.site+'|'+r.product));
        const toImport = newRecords.filter(r=>!existingKeys.has(r._key)).map(({_key,...rest})=>rest);
        if (toImport.length>0) { handleImport(toImport); }
        else addToast('没有新记录需要导入（全部重复）','warn');
      } catch(err) { addToast('解析文件失败：'+err.message,'error'); }
    };
    reader.readAsBinaryString(file);
  };

  if (loading) return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', gap:16, color:'#6B7280'}}>
      <div style={{fontSize:36}}>⏳</div>
      <div style={{fontSize:16, fontWeight:600}}>正在加载数据...</div>
      <div style={{fontSize:13}}>连接到 Supabase 云端数据库</div>
    </div>
  );

  const TOAST_COLORS = { success:'#059669', warn:'#D97706', info:'#2E75B6', error:'#DC2626' };
  const showSidebar = view === 'dashboard';

  return (
    <div style={{display:'flex', height:'100vh'}}>
      <style>{`@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}`}</style>

      {/* Toast notifications */}
      <div style={{position:'fixed', top:16, right:16, zIndex:9999, display:'flex', flexDirection:'column', gap:8, pointerEvents:'none'}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            background:'white', border:`1.5px solid ${TOAST_COLORS[t.type]||TOAST_COLORS.info}`,
            borderLeft:`4px solid ${TOAST_COLORS[t.type]||TOAST_COLORS.info}`,
            borderRadius:10, padding:'10px 16px', fontSize:13, fontWeight:600,
            color:'#111827', boxShadow:'0 4px 16px rgba(0,0,0,0.12)',
            maxWidth:320, animation:'slideIn 0.2s ease',
          }}>{t.msg}</div>
        ))}
      </div>

      {/* Sidebar — visible only on dashboard */}
      {showSidebar && (
        <Sidebar page={sidebarPage} onPage={setSidebarPage} records={records}/>
      )}

      {/* Main content */}
      <div style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column', background:'#F8FAFC', minHeight:0}}>
        {view==='dashboard' && (
          sidebarPage==='overview' ? (
            <OverviewTable
              records={records}
              onOpen={handleOpen}
              onUpdate={handleUpdate}
              onNew={()=>setView('new')}
              onImport={handleImportFile}
              onDelete={handleDelete}
              onRestore={handleRestore}
              onCopy={handleCopy}
              siteFilter={null}
            />
          ) : (
            <SiteView
              site={sidebarPage}
              records={records}
              onOpen={handleOpen}
              onUpdate={handleUpdate}
              onNew={()=>setView('new')}
              onImport={handleImportFile}
              onDelete={handleDelete}
              onRestore={handleRestore}
              onCopy={handleCopy}
            />
          )
        )}
        {view==='new' && <NewListingWizard onSave={handleSave} onCancel={()=>setView('dashboard')} existingRecords={records} onOpenExisting={id=>{ setActiveId(id); setView('checklist'); }}/>}
        {view==='checklist' && activeRecord && <ChecklistView record={activeRecord} onBack={handleBack} onUpdate={handleUpdate} addToast={addToast}/>}
        {view==='completed' && <CompletedTable records={records} onBack={()=>setView('dashboard')}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
